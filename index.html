  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exa Capital — Registros Societários</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════════
const SUPA_URL = "https://djeeqkpaaskspojjwzmg.supabase.co";
const SUPA_KEY = "sb_publishable_ihAfzj9jDXNVqbAw1LGHfw_4HCoC3Oo";
const SUPA_HEADERS = {
  "apikey": SUPA_KEY,
  "Authorization": `Bearer ${SUPA_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

const supa = {
  async get(table, params = "") {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, { headers: SUPA_HEADERS });
    if (!r.ok) throw new Error(`GET ${table}: ${r.status}`);
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: "POST", headers: SUPA_HEADERS, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(`POST ${table}: ${r.status} ${await r.text()}`);
    return r.json();
  },
  async patch(table, id, data) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "PATCH", headers: SUPA_HEADERS, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(`PATCH ${table}: ${r.status}`);
    return r.json();
  },
  async del(table, id) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: "DELETE", headers: { ...SUPA_HEADERS, "Prefer": "return=minimal" }
    });
    if (!r.ok) throw new Error(`DELETE ${table}: ${r.status}`);
  }
};

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const ANEXO_CATS = [
  { key: "ato_elaborado",          label: "Ato Elaborado" },
  { key: "ato_assinado",           label: "Ato Assinado" },
  { key: "comprovante_protocolo",  label: "Comprovante de Protocolo" },
  { key: "exigencia_apontada",     label: "Exigência Apontada" },
  { key: "ato_exigencia_cumprida", label: "Ato com Exigência Cumprida" },
  { key: "novo_protocolo",         label: "Novo Protocolo" },
  { key: "ato_registrado",         label: "Ato Registrado" },
  { key: "despesa",                label: "Despesa" },
  { key: "comprovante_pagamento",  label: "Comprovante de Pagamento da Despesa" },

const emptyAnexos = () => Object.fromEntries(ANEXO_CATS.map(c => [c.key, null]));

const COLUNAS = [
  { id:1,  label:"Elaboração do Ato",        group:"main",      color:"#F8F9FA", accent:"#6C757D" },
  { id:2,  label:"Aguardando Assinatura",     group:"main",      color:"#FFF9E6", accent:"#F0A500" },
  { id:3,  label:"Enviado ao Paralegal",      group:"main",      color:"#EEF2FF", accent:"#4361EE" },
  { id:4,  label:"Aguardando Junta",          group:"main",      color:"#F0F4FF", accent:"#1B3A6B" },
  { id:5,  label:"Exigência Apontada",        group:"exigencia", color:"#FFF2F2", accent:"#D62828" },
  { id:6,  label:"Cumprindo Exigência",       group:"exigencia", color:"#FFF7ED", accent:"#E85D04" },
  { id:7,  label:"Novo Protocolo",            group:"exigencia", color:"#FFF9E6", accent:"#F0A500" },
  { id:8,  label:"Aguard. Junta (Reapres.)",  group:"exigencia", color:"#F0F4FF", accent:"#1B3A6B" },
  { id:9,  label:"Registrado",                group:"pos",       color:"#F0FFF4", accent:"#2D6A4F" },
  { id:10, label:"NF p/ Pagamento",           group:"pos",       color:"#FFF9E6", accent:"#E9C46A" },
  { id:11, label:"Aguardando Pagamento",      group:"pos",       color:"#FFF2E6", accent:"#E07A31" },
  { id:12, label:"Pago",                      group:"pos",       color:"#F0FFF4", accent:"#52B788" },
  { id:13, label:"Concluído",                 group:"pos",       color:"#E8F5E9", accent:"#1B5E20" },
];

const GROUP_LABELS = {
  main:      { label: "Fluxo Principal",       bg: "#1B3A6B", text: "#fff" },
  exigencia: { label: "Sub-fluxo: Exigência",  bg: "#D62828", text: "#fff" },
  pos:       { label: "Pós-Registro",          bg: "#2D6A4F", text: "#fff" },
};

const CARD_COLORS = [
  { border: "#1B3A6B", bg: "#EEF2FF" },
  { border: "#E07A31", bg: "#FFF2E6" },
  { border: "#2D6A4F", bg: "#F0FFF4" },
  { border: "#F0A500", bg: "#FFF9E6" },
  { border: "#7B2FBE", bg: "#F5EEFF" },
  { border: "#D62828", bg: "#FFF2F2" },
  { border: "#0077B6", bg: "#E0F4FF" },
  { border: "#52B788", bg: "#E8F5E9" },
];

const DOCUSIGN_STATUS = ["—", "Enviado", "Aguardando Assinaturas", "Parcialmente Assinado", "Concluído", "Cancelado"];
const DOCUSIGN_COLORS = { "Enviado":"#4361EE","Aguardando Assinaturas":"#F0A500","Parcialmente Assinado":"#E85D04","Concluído":"#2D6A4F","Cancelado":"#D62828","—":"#aaa" };

const NAV = "#0D2240", GOLD = "#C9A84C";
const today = () => new Date().toISOString().split("T")[0];
const fmt = d => d ? new Date(d + "T12:00:00").toLocaleDateString("pt-BR") : "—";

// ═══════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════
function App() {
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [processos, setProcessos] = useState([]);
  const [sociedades, setSociedades] = useState([]);
  const [historicos, setHistoricos] = useState([]);
  const [view, setView] = useState("kanban"); // kanban | form | edit | sociedades | detail | archived
  const [editId, setEditId] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const [quickEdit, setQuickEdit] = useState(null);
  const [quickForm, setQuickForm] = useState({});
  const [dragging, setDragging] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [toast, setToast] = useState(null);
  const catFileRef = useRef({});
  const fileRef = useRef();

  // ── Toast ──
  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  // ── Load data from Supabase ──
  const loadData = useCallback(async () => {
    try {
      setLoading(true);
      const [procs, socs, hists] = await Promise.all([
        supa.get("processos", "order=created_at.asc"),
        supa.get("sociedades", "order=nome.asc"),
        supa.get("historicos", "order=data.asc"),
      ]);
      setProcessos(procs || []);
      setSociedades(socs || []);
      setHistoricos(hists || []);
      setError(null);
    } catch (e) {
      console.error("Load error:", e);
      setError("Erro ao conectar ao banco de dados. Verifique sua conexão.");
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  // ── Helpers ──
  const procById = id => processos.find(p => p.id === id);
  const histsFor = pid => historicos.filter(h => h.processo_id === pid);

  const addHistorico = async (processoId, etapa, descricao, responsavel = "") => {
    try {
      const [h] = await supa.post("historicos", { processo_id: processoId, etapa, descricao, responsavel });
      setHistoricos(prev => [...prev, h]);
      return h;
    } catch(e) { console.error(e); }
  };

  // ── CRUD ──
  const createProcesso = async (data) => {
    setSaving(true);
    try {
      const [p] = await supa.post("processos", {
        ...data,
        anexos: emptyAnexos(),
        anexos_arquivados: [],
      });
      setProcessos(prev => [...prev, p]);
      await addHistorico(p.id, data.etapa || 1, "Processo criado.", data.responsavel);
      showToast("Processo criado!");
      setView("kanban");
    } catch(e) {
      console.error(e);
      showToast("Erro ao criar processo.", "error");
    } finally { setSaving(false); }
  };

  const updateProcesso = async (id, data) => {
    setSaving(true);
    try {
      const old = procById(id);
      // Se moveu para Concluído (13), arquivar anexos
      if (data.etapa === 13 && old && old.etapa !== 13) {
        const currentAnexos = data.anexos || old.anexos || emptyAnexos();
        const hasFiles = Object.values(currentAnexos).some(v => v);
        if (hasFiles) {
          data.anexos_arquivados = [...(old.anexos_arquivados || []), { rodada: (old.anexos_arquivados||[]).length + 1, anexos: currentAnexos, data: new Date().toISOString() }];
          data.anexos = emptyAnexos();
        }
      }
      const [p] = await supa.patch("processos", id, data);
      setProcessos(prev => prev.map(x => x.id === id ? p : x));
      if (old && data.etapa && data.etapa !== old.etapa) {
        const colName = COLUNAS.find(c => c.id === data.etapa)?.label || "";
        await addHistorico(id, data.etapa, `Movido para "${colName}".`, data.responsavel || old.responsavel);
      }
      showToast("Salvo!");
    } catch(e) {
      console.error(e);
      showToast("Erro ao salvar.", "error");
    } finally { setSaving(false); }
  };

  const deleteProcesso = async (id) => {
    setSaving(true);
    try {
      await supa.del("processos", id);
      setProcessos(prev => prev.filter(x => x.id !== id));
      setHistoricos(prev => prev.filter(h => h.processo_id !== id));
      showToast("Processo excluído.");
      setDeleteConfirm(null);
    } catch(e) {
      console.error(e);
      showToast("Erro ao excluir.", "error");
    } finally { setSaving(false); }
  };

  // Sociedades CRUD
  const createSociedade = async (data) => {
    try {
      const [s] = await supa.post("sociedades", data);
      setSociedades(prev => [...prev, s]);
      showToast("Sociedade criada!");
    } catch(e) { showToast("Erro.", "error"); }
  };
  const updateSociedade = async (id, data) => {
    try {
      const [s] = await supa.patch("sociedades", id, data);
      setSociedades(prev => prev.map(x => x.id === id ? s : x));
    } catch(e) { showToast("Erro.", "error"); }
  };
  const deleteSociedade = async (id) => {
    try {
      await supa.del("sociedades", id);
      setSociedades(prev => prev.filter(x => x.id !== id));
    } catch(e) { showToast("Erro.", "error"); }
  };

  // ── Quick Edit Fields ──
  const quickFields = (etapa) => {
    const all = {
      responsavel:          { label:"Responsável", type:"text" },
      docusign_link:        { label:"Link DocuSign", type:"text", placeholder:"https://account.docusign.com/..." },
      docusign_status:      { label:"Status DocuSign", type:"select", opts: DOCUSIGN_STATUS },
      docusign_signatarios: { label:"Signatários", type:"text", placeholder:"João ✓, Maria (pendente)" },
      data_protocolo:       { label:"Data do Protocolo", type:"date" },
      numero_protocolo:     { label:"Nº Protocolo", type:"text" },
      prazo_previsto:       { label:"Prazo Previsto", type:"date" },
      exigencia:            { label:"Descrição da Exigência", type:"text" },
      data_exigencia:       { label:"Data Exigência", type:"date" },
      data_registro:        { label:"Data de Registro", type:"date" },
      nf_numero:            { label:"Nº NF", type:"text" },
      nf_valor:             { label:"Valor NF (R$)", type:"text" },
      nf_data:              { label:"Data NF", type:"date" },
      data_pagamento:       { label:"Data Pagamento", type:"date" },
      observacoes:          { label:"Observações", type:"textarea" },
    };
    const map = {
      1:["responsavel","observacoes"],
      2:["docusign_link","docusign_status","docusign_signatarios","observacoes"],
      3:["data_protocolo","observacoes"],
      4:["numero_protocolo","data_protocolo","prazo_previsto","observacoes"],
      5:["exigencia","data_exigencia","observacoes"],
      6:["exigencia","observacoes"],
      7:["numero_protocolo","data_protocolo","observacoes"],
      8:["numero_protocolo","prazo_previsto","observacoes"],
      9:["data_registro","observacoes"],
      10:["nf_numero","nf_valor","nf_data","observacoes"],
      11:["nf_numero","nf_valor","nf_data","observacoes"],
      12:["data_pagamento","observacoes"],
      13:["data_pagamento","observacoes"],
    };
    return (map[etapa]||["observacoes"]).map(k => ({ key:k, ...all[k] }));
  };

  // ── Drag & Drop ──
  const onDragStart = (e, id) => { setDragging(id); e.dataTransfer.effectAllowed = "move"; };
  const onDrop = async (e, colId) => {
    e.preventDefault();
    if (!dragging) return;
    const p = procById(dragging);
    if (p && p.etapa !== colId) {
      await updateProcesso(dragging, { etapa: colId, responsavel: p.responsavel });
    }
    setDragging(null);
  };

  // ── Render helpers ──
  const cardColor = (p) => CARD_COLORS[p.cor_index % CARD_COLORS.length];

  // ═══════════════════════════════════════
  // LOADING SCREEN
  // ═══════════════════════════════════════
  if (loading) {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:16 }}>
        <div className="spinner" style={{ width:40, height:40, borderWidth:3 }}></div>
        <div style={{ color:"#666", fontSize:14 }}>Conectando ao banco de dados...</div>
      </div>
    );
  }

  if (error) {
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:16 }}>
        <div style={{ fontSize:48 }}>⚠️</div>
        <div style={{ color:"#D62828", fontSize:14, maxWidth:400, textAlign:"center" }}>{error}</div>
        <button onClick={loadData} style={{ padding:"8px 24px", background:GOLD, color:"#fff", border:"none", borderRadius:6, fontSize:14 }}>
          Tentar novamente
        </button>
      </div>
    );
  }

  // ═══════════════════════════════════════
  // NAVBAR
  // ═══════════════════════════════════════
  const Navbar = () => (
    <div style={{ background:NAV, color:"#fff", padding:"0 24px", display:"flex", alignItems:"center", height:52, justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <span style={{ fontWeight:700, fontSize:18, color:GOLD, letterSpacing:1 }}>EXA CAPITAL</span>
        <span style={{ fontSize:12, opacity:.6, borderLeft:"1px solid #ffffff30", paddingLeft:12 }}>Registros Societários</span>
      </div>
      <div style={{ display:"flex", gap:6 }}>
        {[
          { v:"kanban", icon:"📋", label:"Kanban" },
          { v:"form", icon:"➕", label:"Novo" },
          { v:"sociedades", icon:"🏢", label:"Sociedades" },
          { v:"archived", icon:"📁", label:"Arquivados" },
        ].map(b => (
          <button key={b.v} onClick={() => { setView(b.v); setEditId(null); setQuickEdit(null); }}
            style={{ padding:"6px 14px", border:"none", borderRadius:6, fontSize:12, fontWeight:600,
              background: view === b.v ? GOLD : "transparent", color: view === b.v ? "#fff" : "#ccc",
              transition:"all .2s" }}>
            {b.icon} {b.label}
          </button>
        ))}
      </div>
      {saving && <div className="spinner" style={{ marginLeft:8 }}></div>}
    </div>
  );

  // ═══════════════════════════════════════
  // FORM (Create / Edit)
  // ═══════════════════════════════════════
  const FormView = () => {
    const isEdit = view === "edit" && editId;
    const existing = isEdit ? procById(editId) : null;
    const [f, setF] = useState(existing || {
      sociedade: "", tipo_ato: "", responsavel: "", etapa: 1, observacoes: "", cor_index: 0,
      docusign_link: "", docusign_status: "—", docusign_signatarios: "",
      numero_protocolo: "", data_protocolo: "", prazo_previsto: "",
      exigencia: "", data_exigencia: "", data_registro: "",
      nf_numero: "", nf_valor: "", nf_data: "", data_pagamento: "",
    });
    const set = (k,v) => setF(prev => ({...prev, [k]: v}));
    const socNames = [...new Set([...sociedades.map(s=>s.nome), ...processos.map(p=>p.sociedade)])].filter(Boolean).sort();

    const submit = async () => {
      if (!f.sociedade || !f.tipo_ato) { showToast("Preencha Sociedade e Tipo do Ato.", "error"); return; }
      // Assign color based on sociedade
      const socIdx = socNames.indexOf(f.sociedade);
      const corIdx = socIdx >= 0 ? socIdx % CARD_COLORS.length : 0;
      const data = { ...f, cor_index: corIdx };
      // Clean empty date strings to null
      ["data_protocolo","prazo_previsto","data_exigencia","data_registro","nf_data","data_pagamento"].forEach(k => {
        if (!data[k]) data[k] = null;
      });
      if (isEdit) await updateProcesso(editId, data);
      else await createProcesso(data);
      if (!isEdit) setView("kanban");
    };

    const Field = ({label, children}) => (
      <div style={{ marginBottom:12 }}>
        <label style={{ fontSize:11, fontWeight:600, color:"#555", marginBottom:4, display:"block" }}>{label}</label>
        {children}
      </div>
    );
    const inputStyle = { width:"100%", padding:"8px 10px", border:"1px solid #ddd", borderRadius:6, fontSize:13 };

    return (
      <div className="fade-in" style={{ maxWidth:700, margin:"24px auto", background:"#fff", borderRadius:12, padding:24, boxShadow:"0 2px 12px #0001" }}>
        <h2 style={{ margin:"0 0 20px", fontSize:18, color:NAV }}>{isEdit ? "Editar Processo" : "Novo Processo"}</h2>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 16px" }}>
          <Field label="Sociedade">
            <input list="soc-list" value={f.sociedade} onChange={e=>set("sociedade",e.target.value)} style={inputStyle} placeholder="Digite ou selecione..." />
            <datalist id="soc-list">{socNames.map(s => <option key={s} value={s} />)}</datalist>
          </Field>
          <Field label="Tipo do Ato">
            <input value={f.tipo_ato} onChange={e=>set("tipo_ato",e.target.value)} style={inputStyle} placeholder="Ex: Alteração Contratual" />
          </Field>
          <Field label="Responsável">
            <input value={f.responsavel} onChange={e=>set("responsavel",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Etapa">
            <select value={f.etapa} onChange={e=>set("etapa",Number(e.target.value))} style={inputStyle}>
              {COLUNAS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </Field>
          <Field label="Link DocuSign">
            <input value={f.docusign_link} onChange={e=>set("docusign_link",e.target.value)} style={inputStyle} placeholder="https://..." />
          </Field>
          <Field label="Status DocuSign">
            <select value={f.docusign_status} onChange={e=>set("docusign_status",e.target.value)} style={inputStyle}>
              {DOCUSIGN_STATUS.map(s => <option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="Signatários">
            <input value={f.docusign_signatarios} onChange={e=>set("docusign_signatarios",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Nº Protocolo">
            <input value={f.numero_protocolo} onChange={e=>set("numero_protocolo",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Data Protocolo">
            <input type="date" value={f.data_protocolo||""} onChange={e=>set("data_protocolo",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Prazo Previsto">
            <input type="date" value={f.prazo_previsto||""} onChange={e=>set("prazo_previsto",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Exigência">
            <input value={f.exigencia} onChange={e=>set("exigencia",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Data Exigência">
            <input type="date" value={f.data_exigencia||""} onChange={e=>set("data_exigencia",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Data Registro">
            <input type="date" value={f.data_registro||""} onChange={e=>set("data_registro",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Nº NF">
            <input value={f.nf_numero} onChange={e=>set("nf_numero",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Valor NF (R$)">
            <input value={f.nf_valor} onChange={e=>set("nf_valor",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Data NF">
            <input type="date" value={f.nf_data||""} onChange={e=>set("nf_data",e.target.value)} style={inputStyle} />
          </Field>
          <Field label="Data Pagamento">
            <input type="date" value={f.data_pagamento||""} onChange={e=>set("data_pagamento",e.target.value)} style={inputStyle} />
          </Field>
        </div>
        <Field label="Observações">
          <textarea value={f.observacoes} onChange={e=>set("observacoes",e.target.value)} rows={3} style={{...inputStyle, resize:"vertical"}} />
        </Field>
        <div style={{ display:"flex", gap:10, marginTop:16 }}>
          <button onClick={submit} disabled={saving}
            style={{ padding:"10px 32px", background:GOLD, color:"#fff", border:"none", borderRadius:8, fontWeight:600, fontSize:14 }}>
            {saving ? "Salvando..." : isEdit ? "Salvar Alterações" : "Criar Processo"}
          </button>
          <button onClick={() => { setView("kanban"); setEditId(null); }}
            style={{ padding:"10px 24px", background:"#eee", color:"#555", border:"none", borderRadius:8, fontSize:14 }}>
            Cancelar
          </button>
        </div>
      </div>
    );
  };

  // ═══════════════════════════════════════
  // DETAIL MODAL
  // ═══════════════════════════════════════
  const DetailModal = () => {
    if (!detailId) return null;
    const p = procById(detailId);
    if (!p) return null;
    const cc = cardColor(p);
    const hists = histsFor(p.id);
    const col = COLUNAS.find(c => c.id === p.etapa);
    const anexos = p.anexos || emptyAnexos();

    return (
      <div onClick={() => setDetailId(null)} style={{ position:"fixed", inset:0, background:"#0005", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div onClick={e => e.stopPropagation()} className="fade-in"
          style={{ background:"#fff", borderRadius:12, width:"90%", maxWidth:650, maxHeight:"85vh", overflow:"auto", padding:24, boxShadow:"0 8px 32px #0003" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <h3 style={{ margin:0, color:NAV, fontSize:16 }}>{p.sociedade} — {p.tipo_ato}</h3>
            <button onClick={() => setDetailId(null)} style={{ background:"none", border:"none", fontSize:20, color:"#999" }}>✕</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, fontSize:13, marginBottom:16 }}>
            <div><strong>Etapa:</strong> <span style={{ color:col?.accent }}>{col?.label}</span></div>
            <div><strong>Responsável:</strong> {p.responsavel || "—"}</div>
            {p.numero_protocolo && <div><strong>Protocolo:</strong> {p.numero_protocolo}</div>}
            {p.data_protocolo && <div><strong>Data Protocolo:</strong> {fmt(p.data_protocolo)}</div>}
            {p.prazo_previsto && <div><strong>Prazo:</strong> {fmt(p.prazo_previsto)}</div>}
            {p.exigencia && <div style={{gridColumn:"1/-1"}}><strong>Exigência:</strong> {p.exigencia}</div>}
            {p.data_registro && <div><strong>Data Registro:</strong> {fmt(p.data_registro)}</div>}
            {p.nf_numero && <div><strong>NF:</strong> {p.nf_numero} — R$ {p.nf_valor}</div>}
            {p.data_pagamento && <div><strong>Pagamento:</strong> {fmt(p.data_pagamento)}</div>}
            {p.observacoes && <div style={{gridColumn:"1/-1"}}><strong>Obs:</strong> {p.observacoes}</div>}
          </div>
          {/* DocuSign */}
          {p.docusign_link && (
            <div style={{ background:"#F8F9FA", borderRadius:8, padding:12, marginBottom:12, fontSize:13 }}>
              <strong>DocuSign</strong>
              <div style={{ marginTop:6 }}>
                <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:4, fontSize:11, fontWeight:600,
                  background:DOCUSIGN_COLORS[p.docusign_status]+"20", color:DOCUSIGN_COLORS[p.docusign_status] }}>
                  {p.docusign_status}
                </span>
                {p.docusign_signatarios && <span style={{ marginLeft:8 }}>{p.docusign_signatarios}</span>}
              </div>
              <a href={p.docusign_link} target="_blank" rel="noopener" style={{ color:"#4361EE", fontSize:12, marginTop:4, display:"inline-block" }}>
                Abrir no DocuSign ↗
              </a>
            </div>
          )}
          {/* Anexos */}
          <div style={{ marginBottom:12 }}>
            <strong style={{ fontSize:13 }}>Anexos</strong>
            <div style={{ marginTop:6 }}>
              {ANEXO_CATS.map(cat => (
                <div key={cat.key} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"4px 0", borderBottom:"1px solid #f0f0f0", fontSize:12 }}>
                  <span>{cat.label}</span>
                  <span style={{ color: anexos[cat.key] ? "#2D6A4F" : "#ccc" }}>
                    {anexos[cat.key] ? `✅ ${anexos[cat.key].name}` : "—"}
                  </span>
                </div>
              ))}
            </div>
          </div>
          {/* Archived */}
          {(p.anexos_arquivados || []).length > 0 && (
            <div style={{ marginBottom:12 }}>
              <strong style={{ fontSize:13 }}>📁 Atos Arquivados/Concluídos</strong>
              {p.anexos_arquivados.map((rod, i) => (
                <div key={i} style={{ background:"#F8F9FA", borderRadius:6, padding:8, marginTop:6, fontSize:12 }}>
                  <div style={{ fontWeight:600, marginBottom:4 }}>Rodada {rod.rodada} — {new Date(rod.data).toLocaleDateString("pt-BR")}</div>
                  {ANEXO_CATS.map(cat => rod.anexos[cat.key] && (
                    <div key={cat.key} style={{ paddingLeft:8 }}>📄 {cat.label}: {rod.anexos[cat.key].name}</div>
                  ))}
                </div>
              ))}
            </div>
          )}
          {/* Histórico */}
          {hists.length > 0 && (
            <div>
              <strong style={{ fontSize:13 }}>Histórico de Movimentações</strong>
              <div style={{ marginTop:6, maxHeight:200, overflow:"auto" }}>
                {hists.map(h => (
                  <div key={h.id} style={{ display:"flex", gap:8, padding:"4px 0", borderBottom:"1px solid #f5f5f5", fontSize:12 }}>
                    <span style={{ color:"#999", flexShrink:0 }}>{new Date(h.data).toLocaleDateString("pt-BR")}</span>
                    <span>{h.descricao}</span>
                    {h.responsavel && <span style={{ color:"#888" }}>({h.responsavel})</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  // ═══════════════════════════════════════
  // QUICK EDIT PANEL
  // ═══════════════════════════════════════
  const QuickPanel = () => {
    if (!quickEdit) return null;
    const p = procById(quickEdit);
    if (!p) return null;
    const fields = quickFields(quickForm.etapa || p.etapa);

    const save = async () => {
      const data = { ...quickForm };
      ["data_protocolo","prazo_previsto","data_exigencia","data_registro","nf_data","data_pagamento"].forEach(k => {
        if (data[k] === "") data[k] = null;
      });
      await updateProcesso(quickEdit, data);
      setQuickEdit(null);
    };

    return (
      <div style={{ position:"fixed", top:52, right:0, bottom:0, width:340, background:"#fff", boxShadow:"-4px 0 20px #0002", zIndex:150, overflow:"auto", padding:20 }}
        className="fade-in">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h3 style={{ margin:0, fontSize:14, color:NAV }}>{p.sociedade}</h3>
          <button onClick={() => setQuickEdit(null)} style={{ background:"none", border:"none", fontSize:18, color:"#999" }}>✕</button>
        </div>
        <div style={{ fontSize:12, color:"#888", marginBottom:12 }}>{p.tipo_ato}</div>
        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:11, fontWeight:600, color:"#555" }}>Mover para etapa</label>
          <select value={quickForm.etapa || p.etapa} onChange={e => setQuickForm(prev => ({...prev, etapa: Number(e.target.value)}))}
            style={{ width:"100%", padding:"7px 8px", border:"1px solid #ddd", borderRadius:6, fontSize:13, marginTop:4 }}>
            {COLUNAS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
        </div>
        {fields.map(fld => (
          <div key={fld.key} style={{ marginBottom:10 }}>
            <label style={{ fontSize:11, fontWeight:600, color:"#555" }}>{fld.label}</label>
            {fld.type === "select" ? (
              <select value={quickForm[fld.key]||""} onChange={e => setQuickForm(prev => ({...prev, [fld.key]: e.target.value}))}
                style={{ width:"100%", padding:"7px 8px", border:"1px solid #ddd", borderRadius:6, fontSize:13, marginTop:4 }}>
                {fld.opts.map(o => <option key={o}>{o}</option>)}
              </select>
            ) : fld.type === "textarea" ? (
              <textarea value={quickForm[fld.key]||""} onChange={e => setQuickForm(prev => ({...prev, [fld.key]: e.target.value}))}
                rows={2} style={{ width:"100%", padding:"7px 8px", border:"1px solid #ddd", borderRadius:6, fontSize:13, marginTop:4, resize:"vertical" }} />
            ) : (
              <input type={fld.type} value={quickForm[fld.key]||""} onChange={e => setQuickForm(prev => ({...prev, [fld.key]: e.target.value}))}
                placeholder={fld.placeholder||""} style={{ width:"100%", padding:"7px 8px", border:"1px solid #ddd", borderRadius:6, fontSize:13, marginTop:4 }} />
            )}
          </div>
        ))}
        {/* Anexos upload */}
        <div style={{ marginTop:12, borderTop:"1px solid #eee", paddingTop:12 }}>
          <div style={{ fontSize:11, fontWeight:600, color:"#555", marginBottom:8 }}>Anexos</div>
          {ANEXO_CATS.map(cat => {
            const anexos = quickForm.anexos || p.anexos || emptyAnexos();
            const file = anexos[cat.key];
            return (
              <div key={cat.key} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6, fontSize:12 }}>
                <span style={{ flex:1, color: file ? "#2D6A4F" : "#888" }}>
                  {file ? `✅ ${file.name}` : cat.label}
                </span>
                <label style={{ padding:"2px 8px", background:"#f0f0f0", borderRadius:4, cursor:"pointer", fontSize:11 }}>
                  📎
                  <input type="file" hidden onChange={e => {
                    const f = e.target.files[0];
                    if (!f) return;
                    if (f.size > 2 * 1024 * 1024) { showToast("Arquivo muito grande (máx 2MB)", "error"); return; }
                    const reader = new FileReader();
                    reader.onload = () => {
                      const newAnexos = { ...(quickForm.anexos || p.anexos || emptyAnexos()), [cat.key]: { name: f.name, data: reader.result, size: f.size } };
                      setQuickForm(prev => ({ ...prev, anexos: newAnexos }));
                    };
                    reader.readAsDataURL(f);
                  }} />
                </label>
                {file && <button onClick={() => {
                  const newAnexos = { ...(quickForm.anexos || p.anexos || emptyAnexos()), [cat.key]: null };
                  setQuickForm(prev => ({ ...prev, anexos: newAnexos }));
                }} style={{ background:"none", border:"none", color:"#D62828", cursor:"pointer", fontSize:14 }}>✕</button>}
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", gap:8, marginTop:16 }}>
          <button onClick={save} disabled={saving}
            style={{ flex:1, padding:"8px 0", background:GOLD, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13 }}>
            {saving ? "Salvando..." : "Salvar"}
          </button>
          <button onClick={() => { setEditId(quickEdit); setView("edit"); setQuickEdit(null); }}
            style={{ padding:"8px 12px", background:"#eee", border:"none", borderRadius:6, fontSize:12, color:"#555" }}>
            Edição completa
          </button>
        </div>
      </div>
    );
  };

  // ═══════════════════════════════════════
  // KANBAN
  // ═══════════════════════════════════════
  const KanbanView = () => {
    const groups = ["main","exigencia","pos"];
    const activeProcessos = processos.filter(p => p.etapa !== 13);
    return (
      <div style={{ padding:16 }}>
        {groups.map(g => {
          const cols = COLUNAS.filter(c => c.group === g);
          const gl = GROUP_LABELS[g];
          return (
            <div key={g} style={{ marginBottom:20 }}>
              <div style={{ background:gl.bg, color:gl.text, padding:"6px 16px", borderRadius:"8px 8px 0 0", fontSize:12, fontWeight:700, letterSpacing:.5 }}>
                {gl.label}
              </div>
              <div style={{ display:"flex", gap:0, overflowX:"auto", background:"#fff", borderRadius:"0 0 8px 8px", boxShadow:"0 1px 6px #0001" }}>
                {cols.map(col => {
                  const cards = activeProcessos.filter(p => p.etapa === col.id);
                  return (
                    <div key={col.id} style={{ flex:"1 0 180px", minWidth:180, borderRight:"1px solid #f0f0f0", padding:8 }}
                      onDragOver={e => e.preventDefault()} onDrop={e => onDrop(e, col.id)}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                        <div style={{ width:8, height:8, borderRadius:"50%", background:col.accent }}></div>
                        <span style={{ fontSize:11, fontWeight:600, color:"#555" }}>{col.label}</span>
                        <span style={{ fontSize:10, color:"#bbb", marginLeft:"auto" }}>{cards.length}</span>
                      </div>
                      {cards.map(p => {
                        const cc = cardColor(p);
                        const anexos = p.anexos || {};
                        const nAnexos = Object.values(anexos).filter(v => v).length;
                        return (
                          <div key={p.id} draggable onDragStart={e => onDragStart(e, p.id)}
                            onClick={() => { setQuickEdit(p.id); setQuickForm({...p}); }}
                            style={{ borderLeft:`3px solid ${cc.border}`, background:cc.bg, opacity: dragging===p.id ? .5 : 1,
                              borderRadius:6, padding:"8px 10px", marginBottom:6, cursor:"grab", fontSize:12, transition:"opacity .2s" }}>
                            <div style={{ fontWeight:600, color:"#333", marginBottom:2, fontSize:12 }}>{p.sociedade}</div>
                            <div style={{ color:"#666", fontSize:11 }}>{p.tipo_ato}</div>
                            {p.responsavel && <div style={{ color:"#999", fontSize:10, marginTop:2 }}>👤 {p.responsavel}</div>}
                            <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                              {p.docusign_status && p.docusign_status !== "—" && (
                                <span style={{ fontSize:9, padding:"1px 6px", borderRadius:3, fontWeight:600,
                                  background:DOCUSIGN_COLORS[p.docusign_status]+"20", color:DOCUSIGN_COLORS[p.docusign_status] }}>
                                  ✍️ {p.docusign_status}
                                </span>
                              )}
                              {nAnexos > 0 && <span style={{ fontSize:9, color:"#888" }}>📎 {nAnexos}</span>}
                              {p.numero_protocolo && <span style={{ fontSize:9, color:"#888" }}>🔖 {p.numero_protocolo}</span>}
                            </div>
                            <div style={{ display:"flex", gap:4, marginTop:6, justifyContent:"flex-end" }}>
                              <button title="Ver" onClick={e => { e.stopPropagation(); setDetailId(p.id); }}
                                style={{ background:"none", border:"none", fontSize:13, cursor:"pointer" }}>👁</button>
                              <button title="Editar" onClick={e => { e.stopPropagation(); setEditId(p.id); setView("edit"); }}
                                style={{ background:"none", border:"none", fontSize:13, cursor:"pointer" }}>✏️</button>
                              <button title="Excluir" onClick={e => { e.stopPropagation(); setDeleteConfirm(p.id); }}
                                style={{ background:"none", border:"none", fontSize:13, cursor:"pointer" }}>🗑</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  // ═══════════════════════════════════════
  // SOCIEDADES
  // ═══════════════════════════════════════
  const SociedadesView = () => {
    const [nome, setNome] = useState("");
    const [cnpj, setCnpj] = useState("");
    const [editSoc, setEditSoc] = useState(null);
    return (
      <div className="fade-in" style={{ maxWidth:700, margin:"24px auto", background:"#fff", borderRadius:12, padding:24, boxShadow:"0 2px 12px #0001" }}>
        <h2 style={{ margin:"0 0 16px", fontSize:18, color:NAV }}>🏢 Gestão de Sociedades</h2>
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <input placeholder="Nome da sociedade" value={nome} onChange={e=>setNome(e.target.value)}
            style={{ flex:1, padding:"8px 10px", border:"1px solid #ddd", borderRadius:6, fontSize:13 }} />
          <input placeholder="CNPJ" value={cnpj} onChange={e=>setCnpj(e.target.value)}
            style={{ width:180, padding:"8px 10px", border:"1px solid #ddd", borderRadius:6, fontSize:13 }} />
          <button onClick={async () => { if (!nome) return; await createSociedade({nome, cnpj}); setNome(""); setCnpj(""); }}
            style={{ padding:"8px 20px", background:GOLD, color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13 }}>
            Adicionar
          </button>
        </div>
        {sociedades.map(s => {
          const procs = processos.filter(p => p.sociedade === s.nome);
          return (
            <div key={s.id} style={{ borderBottom:"1px solid #f0f0f0", padding:"12px 0" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <span style={{ fontWeight:600, color:NAV, fontSize:14 }}>{s.nome}</span>
                  {s.cnpj && <span style={{ color:"#999", fontSize:12, marginLeft:8 }}>CNPJ: {s.cnpj}</span>}
                  <span style={{ color:"#888", fontSize:11, marginLeft:8 }}>({procs.length} processos)</span>
                </div>
                <button onClick={() => deleteSociedade(s.id)}
                  style={{ background:"none", border:"none", color:"#D62828", cursor:"pointer", fontSize:13 }}>🗑</button>
              </div>
              {procs.length > 0 && (
                <div style={{ marginTop:6, paddingLeft:12 }}>
                  {procs.map(p => (
                    <div key={p.id} style={{ fontSize:12, color:"#555", padding:"2px 0" }}>
                      • {p.tipo_ato} — <span style={{ color: COLUNAS.find(c=>c.id===p.etapa)?.accent }}>{COLUNAS.find(c=>c.id===p.etapa)?.label}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {sociedades.length === 0 && <div style={{ color:"#999", fontSize:13, textAlign:"center", padding:20 }}>Nenhuma sociedade cadastrada.</div>}
      </div>
    );
  };

  // ═══════════════════════════════════════
  // ARCHIVED VIEW
  // ═══════════════════════════════════════
  const ArchivedView = () => {
    const concluded = processos.filter(p => p.etapa === 13);
    return (
      <div className="fade-in" style={{ maxWidth:800, margin:"24px auto", background:"#fff", borderRadius:12, padding:24, boxShadow:"0 2px 12px #0001" }}>
        <h2 style={{ margin:"0 0 16px", fontSize:18, color:NAV }}>📁 Processos Concluídos / Arquivados</h2>
        {concluded.length === 0 && <div style={{ color:"#999", fontSize:13, textAlign:"center", padding:40 }}>Nenhum processo concluído ainda.</div>}
        {concluded.map(p => {
          const hists = histsFor(p.id);
          return (
            <div key={p.id} style={{ borderBottom:"1px solid #f0f0f0", padding:"16px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <span style={{ fontWeight:600, color:NAV }}>{p.sociedade}</span>
                  <span style={{ color:"#666", marginLeft:8, fontSize:13 }}>{p.tipo_ato}</span>
                </div>
                <div style={{ display:"flex", gap:6 }}>
                  <button onClick={() => setDetailId(p.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14 }}>👁</button>
                  <button onClick={() => { setEditId(p.id); setView("edit"); }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14 }}>✏️</button>
                </div>
              </div>
              {(p.anexos_arquivados||[]).length > 0 && (
                <div style={{ marginTop:8 }}>
                  {p.anexos_arquivados.map((rod, i) => (
                    <div key={i} style={{ background:"#F8F9FA", borderRadius:6, padding:8, marginTop:4, fontSize:12 }}>
                      <span style={{ fontWeight:600 }}>Rodada {rod.rodada}</span>
                      <span style={{ color:"#999", marginLeft:8 }}>{new Date(rod.data).toLocaleDateString("pt-BR")}</span>
                      <div style={{ marginTop:4 }}>
                        {ANEXO_CATS.filter(cat => rod.anexos[cat.key]).map(cat => (
                          <span key={cat.key} style={{ display:"inline-block", margin:"2px 4px", padding:"2px 8px", background:"#e8f5e9", borderRadius:4, fontSize:11 }}>
                            📄 {cat.label}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  // ═══════════════════════════════════════
  // DELETE CONFIRM MODAL
  // ═══════════════════════════════════════
  const DeleteModal = () => {
    if (!deleteConfirm) return null;
    const p = procById(deleteConfirm);
    if (!p) return null;
    return (
      <div onClick={() => setDeleteConfirm(null)} style={{ position:"fixed", inset:0, background:"#0005", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div onClick={e => e.stopPropagation()} className="fade-in"
          style={{ background:"#fff", borderRadius:12, padding:24, maxWidth:400, boxShadow:"0 8px 32px #0003", textAlign:"center" }}>
          <div style={{ fontSize:32, marginBottom:12 }}>⚠️</div>
          <div style={{ fontSize:14, color:"#333", marginBottom:8 }}>Excluir este processo?</div>
          <div style={{ fontSize:13, color:"#666", marginBottom:20 }}>{p.sociedade} — {p.tipo_ato}</div>
          <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
            <button onClick={() => deleteProcesso(deleteConfirm)}
              style={{ padding:"8px 24px", background:"#D62828", color:"#fff", border:"none", borderRadius:6, fontWeight:600, fontSize:13 }}>
              Excluir
            </button>
            <button onClick={() => setDeleteConfirm(null)}
              style={{ padding:"8px 24px", background:"#eee", color:"#555", border:"none", borderRadius:6, fontSize:13 }}>
              Cancelar
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ═══════════════════════════════════════
  // TOAST
  // ═══════════════════════════════════════
  const Toast = () => {
    if (!toast) return null;
    return (
      <div className="fade-in" style={{ position:"fixed", bottom:24, right:24, padding:"10px 20px", borderRadius:8, fontSize:13, fontWeight:600, zIndex:500,
        background: toast.type === "error" ? "#D62828" : "#2D6A4F", color:"#fff", boxShadow:"0 4px 12px #0003" }}>
        {toast.msg}
      </div>
    );
  };

  // ═══════════════════════════════════════
  // MAIN RENDER
  // ═══════════════════════════════════════
  return (
    <div>
      <Navbar />
      {(view === "kanban") && <KanbanView />}
      {(view === "form" || view === "edit") && <FormView />}
      {(view === "sociedades") && <SociedadesView />}
      {(view === "archived") && <ArchivedView />}
      <QuickPanel />
      <DetailModal />
      <DeleteModal />
      <Toast />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>

const supa={async get(t,p=""){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{headers:SH});if(!r.ok)throw new Error(`GET ${t}:${r.status}`);return r.json()},async post(t,d){const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:"POST",headers:SH,body:JSON.stringify(d)});if(!r.ok)throw new Error(`POST ${t}:${r.status} ${await r.text()}`);return r.json()},async patch(t,id,d){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?id=eq.${id}`,{method:"PATCH",headers:SH,body:JSON.stringify(d)});if(!r.ok)throw new Error(`PATCH ${t}:${r.status}`);return r.json()},async del(t,id){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?id=eq.${id}`,{method:"DELETE",headers:{...SH,"Prefer":"return=minimal"}});if(!r.ok)throw new Error(`DEL ${t}:${r.status}`)}};

const emptyAnexos=()=>Object.fromEntries(ANEXO_CATS.map(c=>[c.key,null]));
const COLUNAS=[{id:1,label:"Elaboração do Ato",group:"main",color:"#F8F9FA",accent:"#6C757D"},{id:2,label:"Aguardando Assinatura",group:"main",color:"#FFF9E6",accent:"#F0A500"},{id:3,label:"Enviado ao Paralegal",group:"main",color:"#EEF2FF",accent:"#4361EE"},{id:4,label:"Aguardando Junta",group:"main",color:"#F0F4FF",accent:"#1B3A6B"},{id:5,label:"Exigência Apontada",group:"exigencia",color:"#FFF2F2",accent:"#D62828"},{id:6,label:"Cumprindo Exigência",group:"exigencia",color:"#FFF7ED",accent:"#E85D04"},{id:7,label:"Novo Protocolo",group:"exigencia",color:"#FFF9E6",accent:"#F0A500"},{id:8,label:"Aguard. Junta (Reapres.)",group:"exigencia",color:"#F0F4FF",accent:"#1B3A6B"},{id:9,label:"Registrado",group:"pos",color:"#F0FFF4",accent:"#2D6A4F"},{id:10,label:"NF p/ Pagamento",group:"pos",color:"#FFF9E6",accent:"#E9C46A"},{id:11,label:"Aguardando Pagamento",group:"pos",color:"#FFF2E6",accent:"#E07A31"},{id:12,label:"Pago",group:"pos",color:"#F0FFF4",accent:"#52B788"},{id:13,label:"Concluído",group:"pos",color:"#E8F5E9",accent:"#1B5E20"}];
const GL={main:{label:"Fluxo Principal",bg:"#1B3A6B",text:"#fff"},exigencia:{label:"Sub-fluxo: Exigência",bg:"#D62828",text:"#fff"},pos:{label:"Pós-Registro",bg:"#2D6A4F",text:"#fff"}};
const CCS=[{border:"#1B3A6B",bg:"#EEF2FF"},{border:"#E07A31",bg:"#FFF2E6"},{border:"#2D6A4F",bg:"#F0FFF4"},{border:"#F0A500",bg:"#FFF9E6"},{border:"#7B2FBE",bg:"#F5EEFF"},{border:"#D62828",bg:"#FFF2F2"},{border:"#0077B6",bg:"#E0F4FF"},{border:"#52B788",bg:"#E8F5E9"}];

const today=()=>new Date().toISOString().split("T")[0];
const fmt=d=>d?new Date(d+"T12:00:00").toLocaleDateString("pt-BR"):"—";
const emptyProc=()=>({sociedade:"",tipo_ato:"",responsavel:"",junta_comercial:"JUCESP",etapa:1,observacoes:"",cor_index:0,data_elaboracao:today(),data_protocolo:null,numero_protocolo:"",prazo_previsto:null,data_registro:null,docusign_link:"",docusign_status:"—",docusign_signatarios:"",exigencia:"",data_exigencia:null,nf_numero:"",nf_valor:"",nf_data:null,data_pagamento:null,anexos:emptyAnexos(),anexos_arquivados:[]});
const inputS={width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:13,background:"#fff"};

function App(){
const[loading,setLoading]=useState(true),[saving,setSaving]=useState(false),[error,setError]=useState(null);
const[processos,setProcessos]=useState([]),[sociedades,setSociedades]=useState([]),[historicos,setHistoricos]=useState([]);
const[view,setView]=useState("kanban"),[editId,setEditId]=useState(null),[detailId,setDetailId]=useState(null);
const[quickEdit,setQuickEdit]=useState(null),[quickForm,setQuickForm]=useState({});
const[dragging,setDragging]=useState(null),[deleteConfirm,setDeleteConfirm]=useState(null),[toast,setToast]=useState(null);
const showToast=(m,t="success")=>{setToast({msg:m,type:t});setTimeout(()=>setToast(null),3000)};
const loadData=useCallback(async()=>{try{setLoading(true);const[p,s,h]=await Promise.all([supa.get("processos","order=created_at.asc"),supa.get("sociedades","order=nome.asc"),supa.get("historicos","order=data.asc")]);setProcessos(p||[]);setSociedades(s||[]);setHistoricos(h||[]);setError(null)}catch(e){console.error(e);setError("Erro ao conectar ao banco de dados.")}finally{setLoading(false)}},[]);
useEffect(()=>{loadData()},[loadData]);
const procById=id=>processos.find(p=>p.id===id);const histsFor=pid=>historicos.filter(h=>h.processo_id===pid);
const addHist=async(pid,etapa,desc,resp="")=>{try{const[h]=await supa.post("historicos",{processo_id:pid,etapa,descricao:desc,responsavel:resp});setHistoricos(p=>[...p,h])}catch(e){console.error(e)}};
const dateFields=["data_protocolo","prazo_previsto","data_exigencia","data_registro","nf_data","data_pagamento","data_elaboracao"];
const cleanDates=d=>{const c={...d};dateFields.forEach(k=>{if(!c[k]||c[k]==="")c[k]=null});return c};
const createProcesso=async d=>{setSaving(true);try{const[p]=await supa.post("processos",cleanDates(d));setProcessos(prev=>[...prev,p]);await addHist(p.id,d.etapa||1,"Processo criado.",d.responsavel);showToast("Processo criado!");setView("kanban")}catch(e){console.error(e);showToast("Erro ao criar.","error")}finally{setSaving(false)}};
const updateProcesso=async(id,data)=>{setSaving(true);try{const old=procById(id);const clean=cleanDates(data);if(clean.etapa===13&&old&&old.etapa!==13){const ca=clean.anexos||old.anexos||emptyAnexos();if(Object.values(ca).some(v=>v)){clean.anexos_arquivados=[...(old.anexos_arquivados||[]),{rodada:(old.anexos_arquivados||[]).length+1,anexos:ca,data:new Date().toISOString()}];clean.anexos=emptyAnexos()}}const[p]=await supa.patch("processos",id,clean);setProcessos(prev=>prev.map(x=>x.id===id?p:x));if(old&&clean.etapa&&clean.etapa!==old.etapa){await addHist(id,clean.etapa,`Movido para "${COLUNAS.find(c=>c.id===clean.etapa)?.label}".`,clean.responsavel||old.responsavel)}showToast("Salvo!")}catch(e){console.error(e);showToast("Erro.","error")}finally{setSaving(false)}};
const deleteProcesso=async id=>{setSaving(true);try{await supa.del("processos",id);setProcessos(p=>p.filter(x=>x.id!==id));setHistoricos(p=>p.filter(h=>h.processo_id!==id));showToast("Excluído.");setDeleteConfirm(null)}catch(e){showToast("Erro.","error")}finally{setSaving(false)}};
const createSoc=async d=>{try{const[s]=await supa.post("sociedades",d);setSociedades(p=>[...p,s]);showToast("Sociedade criada!")}catch(e){showToast("Erro.","error")}};
const delSoc=async id=>{try{await supa.del("sociedades",id);setSociedades(p=>p.filter(x=>x.id!==id))}catch(e){showToast("Erro.","error")}};
const cardColor=p=>CCS[p.cor_index%CCS.length];
const socNames=[...new Set([...sociedades.map(s=>s.nome),...processos.map(p=>p.sociedade)])].filter(Boolean).sort();
const qFields=etapa=>{const a={responsavel:{label:"Responsável",type:"text"},docusign_link:{label:"Link DocuSign",type:"text",ph:"https://account.docusign.com/..."},docusign_status:{label:"Status DocuSign",type:"select",opts:DS_STATUS},docusign_signatarios:{label:"Signatários",type:"text",ph:"João ✓, Maria (pendente)"},data_protocolo:{label:"Data Protocolo",type:"date"},numero_protocolo:{label:"Nº Protocolo",type:"text"},prazo_previsto:{label:"Prazo Previsto",type:"date"},exigencia:{label:"Exigência",type:"text"},data_exigencia:{label:"Data Exigência",type:"date"},data_registro:{label:"Data Registro",type:"date"},nf_numero:{label:"Nº NF",type:"text"},nf_valor:{label:"Valor (R$)",type:"text"},nf_data:{label:"Data NF",type:"date"},data_pagamento:{label:"Data Pagamento",type:"date"},observacoes:{label:"Observações",type:"textarea"}};const m={1:["responsavel","observacoes"],2:["docusign_link","docusign_status","docusign_signatarios","observacoes"],3:["data_protocolo","observacoes"],4:["numero_protocolo","data_protocolo","prazo_previsto","observacoes"],5:["exigencia","data_exigencia","observacoes"],6:["exigencia","observacoes"],7:["numero_protocolo","data_protocolo","observacoes"],8:["numero_protocolo","prazo_previsto","observacoes"],9:["data_registro","observacoes"],10:["nf_numero","nf_valor","nf_data","observacoes"],11:["nf_numero","nf_valor","nf_data","observacoes"],12:["data_pagamento","observacoes"],13:["data_pagamento","observacoes"]};return(m[etapa]||["observacoes"]).map(k=>({key:k,...a[k]}))};
const onDragStart=(e,id)=>{setDragging(id);e.dataTransfer.effectAllowed="move"};

if(loading)return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}><div className="spinner" style={{width:40,height:40,borderWidth:3}}/><div style={{color:"#666",fontSize:14}}>Conectando ao banco de dados...</div></div>;
if(error)return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}><div style={{fontSize:48}}>⚠️</div><div style={{color:"#D62828",fontSize:14,maxWidth:400,textAlign:"center"}}>{error}</div><button onClick={loadData} style={{padding:"8px 24px",background:GOLD,color:"#fff",border:"none",borderRadius:6}}>Tentar novamente</button></div>;

const Navbar=()=>(<div style={{background:NAV,color:"#fff",padding:"0 24px",display:"flex",alignItems:"center",height:52,justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontWeight:700,fontSize:18,color:GOLD,letterSpacing:1}}>EXA CAPITAL</span><span style={{fontSize:12,opacity:.6,borderLeft:"1px solid #ffffff30",paddingLeft:12}}>Registros Societários</span></div><div style={{display:"flex",gap:6}}>{[{v:"kanban",i:"📋",l:"Kanban"},{v:"form",i:"➕",l:"Novo"},{v:"sociedades",i:"🏢",l:"Sociedades"},{v:"archived",i:"📁",l:"Arquivados"}].map(b=><button key={b.v} onClick={()=>{setView(b.v);setEditId(null);setQuickEdit(null)}} style={{padding:"6px 14px",border:"none",borderRadius:6,fontSize:12,fontWeight:600,background:view===b.v?GOLD:"transparent",color:view===b.v?"#fff":"#ccc"}}>{b.i} {b.l}</button>)}</div>{saving&&<div className="spinner" style={{marginLeft:8}}/>}</div>);

// ═══ FORM ═══
const FormView=()=>{const isEdit=view==="edit"&&editId;const existing=isEdit?procById(editId):null;const[f,setF]=useState(existing||emptyProc());const set=(k,v)=>setF(p=>({...p,[k]:v}));
const submit=async()=>{if(!f.sociedade||!f.tipo_ato){showToast("Preencha Sociedade e Tipo do Ato.","error");return}const si=socNames.indexOf(f.sociedade);const d={...f,cor_index:si>=0?si%CCS.length:0};if(isEdit)await updateProcesso(editId,d);else await createProcesso(d);if(!isEdit)setView("kanban")};
const handleAnexo=(ck,file)=>{if(!file)return;if(file.size>2*1024*1024){showToast("Máx 2MB","error");return}const r=new FileReader();r.onload=()=>{set("anexos",{...(f.anexos||emptyAnexos()),[ck]:{name:file.name,data:r.result,size:file.size}})};r.readAsDataURL(file)};

return(<div className="fade-in" style={{maxWidth:560,margin:"24px auto",padding:"0 16px"}}><div style={{background:"#fff",borderRadius:14,padding:"28px 28px 20px",boxShadow:"0 2px 16px #0001"}}>

<div style={secS}>{secT("📎","ANEXOS")}{ANEXO_CATS.map((cat,i)=>{const file=(f.anexos||{})[cat.key];return(<div key={cat.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderBottom:i<ANEXO_CATS.length-1?"1px solid #eee":"none",fontSize:13}}><span style={{color:file?"#2D6A4F":"#555"}}>{i+1}. {cat.label}{file?` — ${file.name}`:""}</span><div style={{display:"flex",gap:6,alignItems:"center"}}>{file&&<button onClick={()=>rmAnexo(cat.key)} style={{background:"none",border:"none",color:"#D62828",fontSize:14,cursor:"pointer"}}>✕</button>}<label style={{padding:"4px 14px",background:GOLD,color:"#fff",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>Anexar<input type="file" hidden onChange={e=>handleAnexo(cat.key,e.target.files[0])} accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.xls,.xlsx"/></label></div></div>)})}</div>

</div></div>)};

// ═══ DETAIL ═══
const DetailModal=()=>{if(!detailId)return null;const p=procById(detailId);if(!p)return null;const hists=histsFor(p.id),col=COLUNAS.find(c=>c.id===p.etapa),anexos=p.anexos||emptyAnexos();
return(<div onClick={()=>setDetailId(null)} style={{position:"fixed",inset:0,background:"#0005",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}><div onClick={e=>e.stopPropagation()} className="fade-in" style={{background:"#fff",borderRadius:12,width:"90%",maxWidth:650,maxHeight:"85vh",overflow:"auto",padding:24,boxShadow:"0 8px 32px #0003"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h3 style={{margin:0,color:NAV,fontSize:16}}>{p.sociedade} — {p.tipo_ato}</h3><button onClick={()=>setDetailId(null)} style={{background:"none",border:"none",fontSize:20,color:"#999"}}>✕</button></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13,marginBottom:16}}><div><strong>Etapa:</strong> <span style={{color:col?.accent}}>{col?.label}</span></div><div><strong>Responsável:</strong> {p.responsavel||"—"}</div>{p.junta_comercial&&<div><strong>Junta:</strong> {p.junta_comercial}</div>}{p.data_elaboracao&&<div><strong>Elaboração:</strong> {fmt(p.data_elaboracao)}</div>}{p.numero_protocolo&&<div><strong>Protocolo:</strong> {p.numero_protocolo}</div>}{p.data_protocolo&&<div><strong>Data Protocolo:</strong> {fmt(p.data_protocolo)}</div>}{p.prazo_previsto&&<div><strong>Prazo:</strong> {fmt(p.prazo_previsto)}</div>}{p.exigencia&&<div style={{gridColumn:"1/-1"}}><strong>Exigência:</strong> {p.exigencia}</div>}{p.data_registro&&<div><strong>Registro:</strong> {fmt(p.data_registro)}</div>}{p.nf_numero&&<div><strong>NF:</strong> {p.nf_numero} — R$ {p.nf_valor}</div>}{p.data_pagamento&&<div><strong>Pagamento:</strong> {fmt(p.data_pagamento)}</div>}{p.observacoes&&<div style={{gridColumn:"1/-1"}}><strong>Obs:</strong> {p.observacoes}</div>}</div>
{p.docusign_link&&<div style={{background:"#F8F9FA",borderRadius:8,padding:12,marginBottom:12,fontSize:13}}><strong>DocuSign</strong><div style={{marginTop:6}}><span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:DS_COLORS[p.docusign_status]+"20",color:DS_COLORS[p.docusign_status]}}>{p.docusign_status}</span>{p.docusign_signatarios&&<span style={{marginLeft:8}}>{p.docusign_signatarios}</span>}</div><a href={p.docusign_link} target="_blank" rel="noopener" style={{color:"#4361EE",fontSize:12,marginTop:4,display:"inline-block"}}>Abrir no DocuSign ↗</a></div>}
<div style={{marginBottom:12}}><strong style={{fontSize:13}}>Anexos</strong><div style={{marginTop:6}}>{ANEXO_CATS.map(cat=><div key={cat.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #f0f0f0",fontSize:12}}><span>{cat.label}</span><span style={{color:anexos[cat.key]?"#2D6A4F":"#ccc"}}>{anexos[cat.key]?`✅ ${anexos[cat.key].name}`:"—"}</span></div>)}</div></div>
{(p.anexos_arquivados||[]).length>0&&<div style={{marginBottom:12}}><strong style={{fontSize:13}}>📁 Atos Arquivados</strong>{p.anexos_arquivados.map((rod,i)=><div key={i} style={{background:"#F8F9FA",borderRadius:6,padding:8,marginTop:6,fontSize:12}}><div style={{fontWeight:600,marginBottom:4}}>Rodada {rod.rodada} — {new Date(rod.data).toLocaleDateString("pt-BR")}</div>{ANEXO_CATS.map(cat=>rod.anexos[cat.key]&&<div key={cat.key} style={{paddingLeft:8}}>📄 {cat.label}: {rod.anexos[cat.key].name}</div>)}</div>)}</div>}
{hists.length>0&&<div><strong style={{fontSize:13}}>Histórico</strong><div style={{marginTop:6,maxHeight:200,overflow:"auto"}}>{hists.map(h=><div key={h.id} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:"1px solid #f5f5f5",fontSize:12}}><span style={{color:"#999",flexShrink:0}}>{new Date(h.data).toLocaleDateString("pt-BR")}</span><span>{h.descricao}</span>{h.responsavel&&<span style={{color:"#888"}}>({h.responsavel})</span>}</div>)}</div></div>}
</div></div>)};

// ═══ QUICK PANEL ═══
const QuickPanel=()=>{if(!quickEdit)return null;const p=procById(quickEdit);if(!p)return null;const fields=qFields(quickForm.etapa||p.etapa);
const save=async()=>{await updateProcesso(quickEdit,cleanDates(quickForm));setQuickEdit(null)};
const hQA=(ck,file)=>{if(!file)return;if(file.size>2*1024*1024){showToast("Máx 2MB","error");return}const r=new FileReader();r.onload=()=>setQuickForm(prev=>({...prev,anexos:{...(prev.anexos||p.anexos||emptyAnexos()),[ck]:{name:file.name,data:r.result,size:file.size}}}));r.readAsDataURL(file)};
return(<div style={{position:"fixed",top:52,right:0,bottom:0,width:340,background:"#fff",boxShadow:"-4px 0 20px #0002",zIndex:150,overflow:"auto",padding:20}} className="fade-in">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h3 style={{margin:0,fontSize:14,color:NAV}}>{p.sociedade}</h3><button onClick={()=>setQuickEdit(null)} style={{background:"none",border:"none",fontSize:18,color:"#999"}}>✕</button></div>
<div style={{fontSize:12,color:"#888",marginBottom:12}}>{p.tipo_ato}</div>
<div style={{marginBottom:12}}><label style={labelS}>Mover para etapa</label><select value={quickForm.etapa||p.etapa} onChange={e=>setQuickForm(prev=>({...prev,etapa:Number(e.target.value)}))} style={{...inputS,marginTop:4}}>{COLUNAS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}</select></div>
{fields.map(fld=><div key={fld.key} style={{marginBottom:10}}><label style={labelS}>{fld.label}</label>{fld.type==="select"?<select value={quickForm[fld.key]||""} onChange={e=>setQuickForm(prev=>({...prev,[fld.key]:e.target.value}))} style={{...inputS,marginTop:4}}>{fld.opts.map(o=><option key={o}>{o}</option>)}</select>:fld.type==="textarea"?<textarea value={quickForm[fld.key]||""} onChange={e=>setQuickForm(prev=>({...prev,[fld.key]:e.target.value}))} rows={2} style={{...inputS,marginTop:4,resize:"vertical"}}/>:<input type={fld.type} value={quickForm[fld.key]||""} onChange={e=>setQuickForm(prev=>({...prev,[fld.key]:e.target.value}))} placeholder={fld.ph||""} style={{...inputS,marginTop:4}}/>}</div>)}
<div style={{marginTop:12,borderTop:"1px solid #eee",paddingTop:12}}><div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:8}}>Anexos</div>{ANEXO_CATS.map(cat=>{const anexos=quickForm.anexos||p.anexos||emptyAnexos();const file=anexos[cat.key];return<div key={cat.key} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,fontSize:12}}><span style={{flex:1,color:file?"#2D6A4F":"#888"}}>{file?`✅ ${file.name}`:cat.label}</span><label style={{padding:"2px 8px",background:"#f0f0f0",borderRadius:4,cursor:"pointer",fontSize:11}}>📎<input type="file" hidden onChange={e=>hQA(cat.key,e.target.files[0])}/></label>{file&&<button onClick={()=>setQuickForm(prev=>({...prev,anexos:{...(prev.anexos||p.anexos||emptyAnexos()),[cat.key]:null}}))} style={{background:"none",border:"none",color:"#D62828",cursor:"pointer",fontSize:14}}>✕</button>}</div>})}</div>
<div style={{display:"flex",gap:8,marginTop:16}}><button onClick={save} disabled={saving} style={{flex:1,padding:"8px 0",background:GOLD,color:"#fff",border:"none",borderRadius:6,fontWeight:600,fontSize:13}}>{saving?"Salvando...":"Salvar"}</button><button onClick={()=>{setEditId(quickEdit);setView("edit");setQuickEdit(null)}} style={{padding:"8px 12px",background:"#eee",border:"none",borderRadius:6,fontSize:12,color:"#555"}}>Edição completa</button></div>
</div>)};

// ═══ KANBAN ═══
const KanbanView=()=>{const active=processos.filter(p=>p.etapa!==13);return<div style={{padding:16}}>
{["main","exigencia","pos"].map(g=>{const cols=COLUNAS.filter(c=>c.group===g);const gl=GL[g];return<div key={g} style={{marginBottom:20}}>
<div style={{background:gl.bg,color:gl.text,padding:"6px 16px",borderRadius:"8px 8px 0 0",fontSize:12,fontWeight:700,letterSpacing:.5}}>{gl.label}</div>
<div style={{display:"flex",gap:0,overflowX:"auto",background:"#fff",borderRadius:"0 0 8px 8px",boxShadow:"0 1px 6px #0001"}}>
{cols.map(col=>{const cards=active.filter(p=>p.etapa===col.id);return<div key={col.id} style={{flex:"1 0 180px",minWidth:180,borderRight:"1px solid #f0f0f0",padding:8}} onDragOver={e=>e.preventDefault()} onDrop={e=>onDrop(e,col.id)}>
<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><div style={{width:8,height:8,borderRadius:"50%",background:col.accent}}/><span style={{fontSize:11,fontWeight:600,color:"#555"}}>{col.label}</span><span style={{fontSize:10,color:"#bbb",marginLeft:"auto"}}>{cards.length}</span></div>
{cards.map(p=>{const cc=cardColor(p);const nA=Object.values(p.anexos||{}).filter(v=>v).length;return<div key={p.id} draggable onDragStart={e=>onDragStart(e,p.id)} onClick={()=>{setQuickEdit(p.id);setQuickForm({...p})}} style={{borderLeft:`3px solid ${cc.border}`,background:cc.bg,opacity:dragging===p.id?.5:1,borderRadius:6,padding:"8px 10px",marginBottom:6,cursor:"grab",fontSize:12}}>
<div style={{fontWeight:600,color:"#333",marginBottom:2}}>{p.sociedade}</div><div style={{color:"#666",fontSize:11}}>{p.tipo_ato}</div>
{p.responsavel&&<div style={{color:"#999",fontSize:10,marginTop:2}}>👤 {p.responsavel}</div>}
<div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>{p.docusign_status&&p.docusign_status!=="—"&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:3,fontWeight:600,background:DS_COLORS[p.docusign_status]+"20",color:DS_COLORS[p.docusign_status]}}>✍️ {p.docusign_status}</span>}{nA>0&&<span style={{fontSize:9,color:"#888"}}>📎 {nA}</span>}{p.numero_protocolo&&<span style={{fontSize:9,color:"#888"}}>🔖 {p.numero_protocolo}</span>}</div>
<div style={{display:"flex",gap:4,marginTop:6,justifyContent:"flex-end"}}><button title="Ver" onClick={e=>{e.stopPropagation();setDetailId(p.id)}} style={{background:"none",border:"none",fontSize:13,cursor:"pointer"}}>👁</button><button title="Editar" onClick={e=>{e.stopPropagation();setEditId(p.id);setView("edit")}} style={{background:"none",border:"none",fontSize:13,cursor:"pointer"}}>✏️</button><button title="Excluir" onClick={e=>{e.stopPropagation();setDeleteConfirm(p.id)}} style={{background:"none",border:"none",fontSize:13,cursor:"pointer"}}>🗑</button></div>
</div>})}
</div>})}
</div></div>})}
</div>};

// ═══ SOCIEDADES ═══
const SocView=()=>{const[nome,setNome]=useState("");const[cnpj,setCnpj]=useState("");return<div className="fade-in" style={{maxWidth:700,margin:"24px auto",background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px #0001"}}>
<h2 style={{margin:"0 0 16px",fontSize:18,color:NAV}}>🏢 Gestão de Sociedades</h2>
<div style={{display:"flex",gap:8,marginBottom:16}}><input placeholder="Nome da sociedade" value={nome} onChange={e=>setNome(e.target.value)} style={{flex:1,...inputS}}/><input placeholder="CNPJ" value={cnpj} onChange={e=>setCnpj(e.target.value)} style={{width:180,...inputS}}/><button onClick={async()=>{if(!nome)return;await createSoc({nome,cnpj});setNome("");setCnpj("")}} style={{padding:"8px 20px",background:GOLD,color:"#fff",border:"none",borderRadius:6,fontWeight:600,fontSize:13}}>Adicionar</button></div>
{sociedades.map(s=>{const procs=processos.filter(p=>p.sociedade===s.nome);return<div key={s.id} style={{borderBottom:"1px solid #f0f0f0",padding:"12px 0"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><span style={{fontWeight:600,color:NAV,fontSize:14}}>{s.nome}</span>{s.cnpj&&<span style={{color:"#999",fontSize:12,marginLeft:8}}>CNPJ: {s.cnpj}</span>}<span style={{color:"#888",fontSize:11,marginLeft:8}}>({procs.length} processos)</span></div><button onClick={()=>delSoc(s.id)} style={{background:"none",border:"none",color:"#D62828",cursor:"pointer",fontSize:13}}>🗑</button></div>{procs.length>0&&<div style={{marginTop:6,paddingLeft:12}}>{procs.map(p=><div key={p.id} style={{fontSize:12,color:"#555",padding:"2px 0"}}>• {p.tipo_ato} — <span style={{color:COLUNAS.find(c=>c.id===p.etapa)?.accent}}>{COLUNAS.find(c=>c.id===p.etapa)?.label}</span></div>)}</div>}</div>})}
{sociedades.length===0&&<div style={{color:"#999",fontSize:13,textAlign:"center",padding:20}}>Nenhuma sociedade cadastrada.</div>}
</div>};

// ═══ ARCHIVED ═══
const ArchView=()=>{const concluded=processos.filter(p=>p.etapa===13);return<div className="fade-in" style={{maxWidth:800,margin:"24px auto",background:"#fff",borderRadius:12,padding:24,boxShadow:"0 2px 12px #0001"}}>
<h2 style={{margin:"0 0 16px",fontSize:18,color:NAV}}>📁 Processos Concluídos / Arquivados</h2>
{concluded.length===0&&<div style={{color:"#999",fontSize:13,textAlign:"center",padding:40}}>Nenhum processo concluído ainda.</div>}
{concluded.map(p=><div key={p.id} style={{borderBottom:"1px solid #f0f0f0",padding:"16px 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontWeight:600,color:NAV}}>{p.sociedade}</span><span style={{color:"#666",marginLeft:8,fontSize:13}}>{p.tipo_ato}</span></div><div style={{display:"flex",gap:6}}><button onClick={()=>setDetailId(p.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14}}>👁</button><button onClick={()=>{setEditId(p.id);setView("edit")}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14}}>✏️</button></div></div>
{(p.anexos_arquivados||[]).length>0&&<div style={{marginTop:8}}>{p.anexos_arquivados.map((rod,i)=><div key={i} style={{background:"#F8F9FA",borderRadius:6,padding:8,marginTop:4,fontSize:12}}><span style={{fontWeight:600}}>Rodada {rod.rodada}</span><span style={{color:"#999",marginLeft:8}}>{new Date(rod.data).toLocaleDateString("pt-BR")}</span><div style={{marginTop:4}}>{ANEXO_CATS.filter(cat=>rod.anexos[cat.key]).map(cat=><span key={cat.key} style={{display:"inline-block",margin:"2px 4px",padding:"2px 8px",background:"#e8f5e9",borderRadius:4,fontSize:11}}>📄 {cat.label}</span>)}</div></div>)}</div>}
</div>)}
</div>};

const DelModal=()=>{if(!deleteConfirm)return null;const p=procById(deleteConfirm);if(!p)return null;return<div onClick={()=>setDeleteConfirm(null)} style={{position:"fixed",inset:0,background:"#0005",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}><div onClick={e=>e.stopPropagation()} className="fade-in" style={{background:"#fff",borderRadius:12,padding:24,maxWidth:400,boxShadow:"0 8px 32px #0003",textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>⚠️</div><div style={{fontSize:14,marginBottom:8}}>Excluir este processo?</div><div style={{fontSize:13,color:"#666",marginBottom:20}}>{p.sociedade} — {p.tipo_ato}</div><div style={{display:"flex",gap:10,justifyContent:"center"}}><button onClick={()=>deleteProcesso(deleteConfirm)} style={{padding:"8px 24px",background:"#D62828",color:"#fff",border:"none",borderRadius:6,fontWeight:600,fontSize:13}}>Excluir</button><button onClick={()=>setDeleteConfirm(null)} style={{padding:"8px 24px",background:"#eee",color:"#555",border:"none",borderRadius:6,fontSize:13}}>Cancelar</button></div></div></div>};
const Toast=()=>{if(!toast)return null;return<div className="fade-in" style={{position:"fixed",bottom:24,right:24,padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:500,background:toast.type==="error"?"#D62828":"#2D6A4F",color:"#fff",boxShadow:"0 4px 12px #0003"}}>{toast.msg}</div>};

return<div><Navbar/>{view==="kanban"&&<KanbanView/>}{(view==="form"||view==="edit")&&<FormView/>}{view==="sociedades"&&<SocView/>}{view==="archived"&&<ArchView/>}<QuickPanel/><DetailModal/><DelModal/><Toast/></div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

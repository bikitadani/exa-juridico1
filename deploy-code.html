<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exa Capital — Registros Societários</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { margin: 0; background: #F4F6F9; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 4px; }
    select, input, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLUNAS = [
      { id: 1,  label: "Elaboração do Ato",        group: "main",      color: "#F8F9FA", accent: "#6C757D" },
      { id: 2,  label: "Aguardando Assinatura",     group: "main",      color: "#FFF9E6", accent: "#F0A500" },
      { id: 3,  label: "Enviado ao Paralegal",      group: "main",      color: "#EEF2FF", accent: "#4361EE" },
      { id: 4,  label: "Aguardando Junta",          group: "main",      color: "#F0F4FF", accent: "#1B3A6B" },
      { id: 5,  label: "Exigência Apontada",        group: "exigencia", color: "#FFF2F2", accent: "#D62828" },
      { id: 6,  label: "Cumprindo Exigência",       group: "exigencia", color: "#FFF7ED", accent: "#E85D04" },
      { id: 7,  label: "Novo Protocolo",            group: "exigencia", color: "#FFF9E6", accent: "#F0A500" },
      { id: 8,  label: "Aguard. Junta (Reapres.)",  group: "exigencia", color: "#F0F4FF", accent: "#1B3A6B" },
      { id: 9,  label: "Registrado",                group: "pos",       color: "#F0FFF4", accent: "#2D6A4F" },
      { id: 10, label: "NF p/ Pagamento",           group: "pos",       color: "#FFF9E6", accent: "#E9C46A" },
      { id: 11, label: "Aguardando Pagamento",      group: "pos",       color: "#FFF2E6", accent: "#E07A31" },
      { id: 12, label: "Pago",                      group: "pos",       color: "#F0FFF4", accent: "#52B788" },
      { id: 13, label: "Concluído",                 group: "pos",       color: "#E8F5E9", accent: "#1B5E20" },
    ];
    const GROUP_LABELS = {
      main:      { label: "Fluxo Principal",      bg: "#1B3A6B", text: "#fff" },
      exigencia: { label: "Sub-fluxo: Exigência", bg: "#D62828", text: "#fff" },
      pos:       { label: "Pós-Registro",         bg: "#2D6A4F", text: "#fff" },
    };
    const CARD_COLORS = [
      { border: "#1B3A6B", bg: "#EEF2FF" }, { border: "#E07A31", bg: "#FFF2E6" },
      { border: "#2D6A4F", bg: "#F0FFF4" }, { border: "#F0A500", bg: "#FFF9E6" },
      { border: "#7B2FBE", bg: "#F5EEFF" }, { border: "#D62828", bg: "#FFF2F2" },
      { border: "#0077B6", bg: "#E0F4FF" }, { border: "#52B788", bg: "#E8F5E9" },
    ];
    const DS_STATUS = ["—","Enviado","Aguardando Assinaturas","Parcialmente Assinado","Concluído","Cancelado"];
    const DS_COLORS = { "Enviado":"#4361EE","Aguardando Assinaturas":"#F0A500","Parcialmente Assinado":"#E85D04","Concluído":"#2D6A4F","Cancelado":"#D62828","—":"#aaa" };
    const NAV="#0D2240", GOLD="#C9A84C";
    const today=()=>new Date().toISOString().split("T")[0];
    const fmt=d=>d?new Date(d+"T12:00:00").toLocaleDateString("pt-BR"):"—";
    const fmtSize=b=>b<1024?b+" B":b<1048576?(b/1024).toFixed(1)+" KB":(b/1048576).toFixed(1)+" MB";
    const emptyP={sociedade_id:"",tipo_ato:"",responsavel:"",junta:"JUCESP",data_elaboracao:today(),data_protocolo:"",numero_protocolo:"",prazo_previsto:"",exigencia:"",data_exigencia:"",data_registro:"",nf_numero:"",nf_valor:"",nf_data:"",data_pagamento:"",etapa:1,observacoes:"",docusign_link:"",docusign_status:"—",docusign_signatarios:"",anexos:[]};
    const emptyS={nome:"",cnpj:"",tipo:"",observacoes:""};

    // Storage usando localStorage para versão standalone
    const store = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? { value: v } : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, v); return true; } catch { return false; } }
    };

    function App() {
      const [processos,setProcessos]=useState([]);
      const [sociedades,setSociedades]=useState([]);
      const [historicos,setHistoricos]=useState({});
      const [view,setView]=useState("kanban");
      const [formP,setFormP]=useState(emptyP);
      const [formS,setFormS]=useState(emptyS);
      const [editId,setEditId]=useState(null);
      const [editSocId,setEditSocId]=useState(null);
      const [selectedSoc,setSelectedSoc]=useState(null);
      const [detalhe,setDetalhe]=useState(null);
      const [loading,setLoading]=useState(true);
      const [dragging,setDragging]=useState(null);
      const [dragOver,setDragOver]=useState(null);
      const fileRef=useRef();

      useEffect(()=>{
        try{const r=store.get("processos_exa");if(r)setProcessos(JSON.parse(r.value));}catch{}
        try{const r=store.get("sociedades_exa");if(r)setSociedades(JSON.parse(r.value));}catch{}
        try{const r=store.get("historicos_exa");if(r)setHistoricos(JSON.parse(r.value));}catch{}
        setLoading(false);
      },[]);

      const persist=(p,s,h)=>{
        store.set("processos_exa",JSON.stringify(p??processos));
        store.set("sociedades_exa",JSON.stringify(s??sociedades));
        store.set("historicos_exa",JSON.stringify(h??historicos));
      };

      const addHist=(hists,id,etapa,obs,user)=>{
        const e={etapa,obs,data:new Date().toLocaleString("pt-BR"),user:user||"Jurídico"};
        return{...hists,[id]:[...(hists[id]||[]),e]};
      };

      const socColorMap={};
      sociedades.forEach((s,i)=>{socColorMap[s.id]=CARD_COLORS[i%CARD_COLORS.length];});

      const onDragStart=(e,id)=>{setDragging(id);e.dataTransfer.effectAllowed="move";};
      const onDragOver=(e,colId)=>{e.preventDefault();setDragOver(colId);};
      const onDrop=(e,colId)=>{
        e.preventDefault();
        if(!dragging||colId===processos.find(p=>p.id===dragging)?.etapa){setDragging(null);setDragOver(null);return;}
        const np=processos.map(p=>p.id===dragging?{...p,etapa:colId}:p);
        const nh=addHist(historicos,dragging,colId,`Movido para "${COLUNAS.find(c=>c.id===colId)?.label}".`);
        setProcessos(np);setHistoricos(nh);persist(np,null,nh);
        setDragging(null);setDragOver(null);
      };

      const handleFile=(e)=>{
        Array.from(e.target.files).forEach(file=>{
          if(file.size>1.2*1024*1024){alert(`"${file.name}" excede 1MB.`);return;}
          const r=new FileReader();
          r.onload=(ev)=>{
            const a={name:file.name,size:file.size,type:file.type,data:ev.target.result,date:new Date().toLocaleString("pt-BR")};
            setFormP(prev=>({...prev,anexos:[...(prev.anexos||[]),a]}));
          };
          r.readAsDataURL(file);
        });
        e.target.value="";
      };

      const saveP=()=>{
        if(!formP.tipo_ato)return alert("Preencha o Tipo de Ato.");
        if(!formP.sociedade_id)return alert("Selecione uma sociedade.");
        let np,nh;
        if(editId){
          np=processos.map(p=>p.id===editId?{...formP,id:editId}:p);
          nh=addHist(historicos,editId,formP.etapa,"Processo atualizado.",formP.responsavel);
        }else{
          const id=Date.now().toString();
          np=[{...formP,id},...processos];
          nh=addHist(historicos,id,formP.etapa,"Processo cadastrado.",formP.responsavel);
        }
        setProcessos(np);setHistoricos(nh);persist(np,null,nh);
        setFormP(emptyP);setEditId(null);
        setView(selectedSoc?"sociedade_detail":"kanban");
      };

      const saveS=()=>{
        if(!formS.nome)return alert("Informe o nome.");
        const ns=editSocId?sociedades.map(s=>s.id===editSocId?{...formS,id:editSocId}:s):[{...formS,id:Date.now().toString()},...sociedades];
        setSociedades(ns);persist(null,ns,null);
        setFormS(emptyS);setEditSocId(null);setView("sociedades");
      };

      const delP=(id)=>{
        if(!confirm("Remover?"))return;
        const np=processos.filter(x=>x.id!==id);
        setProcessos(np);setDetalhe(null);persist(np,null,null);
      };
      const delS=(id)=>{
        if(!confirm("Remover sociedade e processos?"))return;
        const np=processos.filter(x=>x.sociedade_id!==id);
        const ns=sociedades.filter(x=>x.id!==id);
        setProcessos(np);setSociedades(ns);persist(np,ns,null);
      };
      const nomeSoc=id=>sociedades.find(s=>s.id===id)?.nome||"—";
      const dlAnexo=(a)=>{const el=document.createElement("a");el.href=a.data;el.download=a.name;el.click();};
      const groups=["main","exigencia","pos"];

      if(loading)return React.createElement("div",{style:{background:NAV,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},React.createElement("div",{style:{color:"#fff",opacity:.5,fontSize:14}},"Carregando..."));

      const Hdr=()=>(
        <div style={{background:NAV,borderBottom:`3px solid ${GOLD}`,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div>
            <div style={{color:GOLD,fontWeight:700,fontSize:15,letterSpacing:1}}>EXA CAPITAL</div>
            <div style={{color:"#fff",fontSize:10,opacity:.4,letterSpacing:3,textTransform:"uppercase"}}>Jurídico · Registros Societários</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{v:"kanban",l:"Kanban"},{v:"sociedades",l:"Sociedades"}].map(({v,l})=>(
              <button key={v} onClick={()=>setView(v)} style={view===v?{background:GOLD,color:NAV,border:"none",padding:"6px 14px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}:{background:"transparent",color:"#fff",border:`1px solid ${GOLD}44`,padding:"6px 14px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>{l}</button>
            ))}
            <button onClick={()=>{if(!sociedades.length)return alert("Cadastre uma sociedade primeiro.");setFormP(emptyP);setEditId(null);setSelectedSoc(null);setView("form_processo");}} style={{background:GOLD,color:NAV,border:"none",padding:"6px 14px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Novo Ato</button>
          </div>
        </div>
      );

      // KANBAN
      if(view==="kanban")return(
        <div style={{minHeight:"100vh",background:"#F4F6F9"}}>
          <Hdr/>
          <div style={{overflowX:"auto",padding:16}}>
            {groups.map(g=>{
              const cols=COLUNAS.filter(c=>c.group===g);
              const gl=GROUP_LABELS[g];
              return(
                <div key={g} style={{marginBottom:24}}>
                  <div style={{background:gl.bg,color:gl.text,display:"inline-block",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,padding:"3px 10px",borderRadius:4,marginBottom:8}}>{gl.label}</div>
                  <div style={{display:"flex",gap:12}}>
                    {cols.map(col=>{
                      const cards=processos.filter(p=>p.etapa===col.id);
                      return(
                        <div key={col.id} onDragOver={e=>onDragOver(e,col.id)} onDrop={e=>onDrop(e,col.id)}
                          style={{flexShrink:0,width:175,borderTop:`3px solid ${dragOver===col.id?GOLD:col.accent}`,background:dragOver===col.id?"#EEF2FF":"#fff",borderRadius:"0 0 8px 8px",boxShadow:"0 1px 4px #0001"}}>
                          <div style={{background:col.color,borderBottom:`1px solid ${col.accent}22`,padding:"8px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{color:col.accent,fontSize:11,fontWeight:700,lineHeight:1.3}}>{col.label}</span>
                            <span style={{background:col.accent,color:"#fff",fontSize:10,fontWeight:700,borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginLeft:4}}>{cards.length}</span>
                          </div>
                          <div style={{padding:6,minHeight:60}}>
                            {cards.map(p=>{
                              const cc=socColorMap[p.sociedade_id]||{border:"#ccc",bg:"#fafafa"};
                              return(
                                <div key={p.id} draggable onDragStart={e=>onDragStart(e,p.id)}
                                  style={{borderLeft:`3px solid ${cc.border}`,background:cc.bg,opacity:dragging===p.id?.4:1,borderRadius:6,padding:"8px 8px 6px",marginBottom:6,boxShadow:"0 1px 3px #0001",cursor:"grab"}}>
                                  <div style={{fontSize:11,fontWeight:700,color:"#1a1a2e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nomeSoc(p.sociedade_id)}</div>
                                  <div style={{fontSize:10,color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{p.tipo_ato}</div>
                                  {p.numero_protocolo&&<div style={{fontSize:10,color:GOLD,marginTop:2}}>#{p.numero_protocolo}</div>}
                                  {p.docusign_status&&p.docusign_status!=="—"&&<div style={{fontSize:10,color:DS_COLORS[p.docusign_status],marginTop:2,fontWeight:600}}>● DS: {p.docusign_status}</div>}
                                  {p.anexos?.length>0&&<div style={{fontSize:10,color:"#999",marginTop:2}}>📎 {p.anexos.length} anexo{p.anexos.length>1?"s":""}</div>}
                                  {p.etapa===4&&p.prazo_previsto&&p.prazo_previsto<today()&&<div style={{fontSize:10,color:"#D62828",marginTop:2}}>⚠ Prazo vencido</div>}
                                  <div style={{display:"flex",gap:6,marginTop:6}}>
                                    <button onClick={()=>setDetalhe(p)} style={{background:"none",border:"none",fontSize:12,cursor:"pointer",opacity:.5,padding:0}}>👁</button>
                                    <button onClick={()=>{setFormP(p);setEditId(p.id);setView("form_processo");}} style={{background:"none",border:"none",fontSize:12,cursor:"pointer",opacity:.5,padding:0}}>✏️</button>
                                    <button onClick={()=>delP(p.id)} style={{background:"none",border:"none",fontSize:12,cursor:"pointer",opacity:.5,padding:0}}>🗑</button>
                                  </div>
                                </div>
                              );
                            })}
                            {cards.length===0&&<div style={{fontSize:11,color:"#ddd",textAlign:"center",padding:"12px 0"}}>—</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
          {detalhe&&<Modal p={detalhe} historicos={historicos} nomeSoc={nomeSoc} onClose={()=>setDetalhe(null)} onEdit={()=>{setFormP(detalhe);setEditId(detalhe.id);setDetalhe(null);setView("form_processo");}} onDelete={()=>delP(detalhe.id)} dlAnexo={dlAnexo}/>}
        </div>
      );

      // SOCIEDADES
      if(view==="sociedades")return(
        <div style={{minHeight:"100vh",background:"#F4F6F9"}}>
          <Hdr/>
          <div style={{maxWidth:800,margin:"0 auto",padding:24}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{color:NAV,fontWeight:700,fontSize:17,margin:0}}>Sociedades Cadastradas</h2>
              <button onClick={()=>{setFormS(emptyS);setEditSocId(null);setView("form_sociedade");}} style={{background:NAV,color:GOLD,border:"none",padding:"8px 16px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Nova Sociedade</button>
            </div>
            {sociedades.length===0&&<div style={{textAlign:"center",color:"#aaa",padding:"60px 0",fontSize:13}}>Nenhuma sociedade cadastrada.</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
              {sociedades.map((s,i)=>{
                const cc=CARD_COLORS[i%CARD_COLORS.length];
                const total=processos.filter(p=>p.sociedade_id===s.id).length;
                const ativos=processos.filter(p=>p.sociedade_id===s.id&&p.etapa<13).length;
                return(
                  <div key={s.id} onClick={()=>{setSelectedSoc(s);setView("sociedade_detail");}} style={{borderLeft:`4px solid ${cc.border}`,background:"#fff",borderRadius:8,padding:16,boxShadow:"0 1px 4px #0001",cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div>
                        <div style={{color:NAV,fontWeight:700,fontSize:13}}>{s.nome}</div>
                        {s.cnpj&&<div style={{color:"#999",fontSize:11,marginTop:2}}>CNPJ: {s.cnpj}</div>}
                        {s.tipo&&<div style={{color:"#999",fontSize:11}}>{s.tipo}</div>}
                      </div>
                      <div style={{textAlign:"right",fontSize:11}}>
                        <div style={{color:"#aaa"}}>{total} ato{total!==1?"s":""}</div>
                        {ativos>0&&<div style={{color:GOLD,fontWeight:700}}>{ativos} em andamento</div>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:12,marginTop:12}} onClick={e=>e.stopPropagation()}>
                      <button onClick={()=>{setFormS(s);setEditSocId(s.id);setView("form_sociedade");}} style={{background:"none",border:"none",color:NAV,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>Editar</button>
                      <button onClick={()=>delS(s.id)} style={{background:"none",border:"none",color:"#e74c3c",fontSize:11,cursor:"pointer",padding:0}}>Remover</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );

      // DETALHE SOCIEDADE
      if(view==="sociedade_detail"&&selectedSoc){
        const meus=processos.filter(p=>p.sociedade_id===selectedSoc.id);
        const cc=socColorMap[selectedSoc.id]||{border:"#ccc"};
        return(
          <div style={{minHeight:"100vh",background:"#F4F6F9"}}>
            <Hdr/>
            <div style={{maxWidth:800,margin:"0 auto",padding:24}}>
              <button onClick={()=>setView("sociedades")} style={{background:"none",border:"none",color:NAV,fontSize:11,fontWeight:700,cursor:"pointer",marginBottom:16}}>← Voltar</button>
              <div style={{borderLeft:`5px solid ${cc.border}`,background:"#fff",borderRadius:8,padding:20,marginBottom:24,boxShadow:"0 1px 4px #0001"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <h2 style={{color:NAV,fontWeight:800,fontSize:20,margin:"0 0 4px"}}>{selectedSoc.nome}</h2>
                    {selectedSoc.cnpj&&<div style={{color:"#999",fontSize:12}}>CNPJ: {selectedSoc.cnpj}</div>}
                    {selectedSoc.tipo&&<div style={{color:"#999",fontSize:12}}>{selectedSoc.tipo}</div>}
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    {[{l:"Total",v:meus.length,bg:"#EEF2FF",c:NAV},{l:"Em andamento",v:meus.filter(p=>p.etapa<13).length,bg:"#FFF9E6",c:GOLD},{l:"Concluídos",v:meus.filter(p=>p.etapa===13).length,bg:"#F0FFF4",c:"#2D6A4F"}]
                      .map(s=><div key={s.l} style={{background:s.bg,borderRadius:8,padding:"8px 16px",textAlign:"center"}}><div style={{color:s.c,fontWeight:800,fontSize:22}}>{s.v}</div><div style={{color:"#aaa",fontSize:11}}>{s.l}</div></div>)}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <h3 style={{color:NAV,fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:1,margin:0}}>Atos Societários</h3>
                <button onClick={()=>{setFormP({...emptyP,sociedade_id:selectedSoc.id});setEditId(null);setView("form_processo");}} style={{background:NAV,color:GOLD,border:"none",padding:"8px 16px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Novo Ato</button>
              </div>
              {meus.length===0&&<div style={{textAlign:"center",color:"#aaa",padding:40,fontSize:13}}>Nenhum ato cadastrado.</div>}
              {meus.map(p=>{
                const col=COLUNAS.find(c=>c.id===p.etapa);
                return(
                  <div key={p.id} style={{borderLeft:`4px solid ${col?.accent}`,background:"#fff",borderRadius:8,padding:16,marginBottom:12,boxShadow:"0 1px 4px #0001"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{color:NAV,fontWeight:600,fontSize:13}}>{p.tipo_ato}</div>
                        <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
                          {p.numero_protocolo&&<span style={{color:"#aaa",fontSize:11}}>Protocolo: {p.numero_protocolo}</span>}
                          {p.data_elaboracao&&<span style={{color:"#aaa",fontSize:11}}>Elaboração: {fmt(p.data_elaboracao)}</span>}
                          {p.responsavel&&<span style={{color:"#aaa",fontSize:11}}>Resp.: {p.responsavel}</span>}
                          {p.docusign_status&&p.docusign_status!=="—"&&<span style={{color:DS_COLORS[p.docusign_status],fontSize:11,fontWeight:600}}>● DS: {p.docusign_status}</span>}
                          {p.anexos?.length>0&&<span style={{color:"#aaa",fontSize:11}}>📎 {p.anexos.length} anexo{p.anexos.length>1?"s":""}</span>}
                        </div>
                        {p.exigencia&&<div style={{color:"#D62828",fontSize:11,marginTop:4}}>⚠ {p.exigencia}</div>}
                      </div>
                      <span style={{background:col?.color,color:col?.accent,border:`1px solid ${col?.accent}44`,fontSize:10,padding:"4px 8px",borderRadius:20,fontWeight:700,whiteSpace:"nowrap",marginLeft:8}}>{col?.label}</span>
                    </div>
                    <div style={{display:"flex",gap:12,marginTop:12}}>
                      <button onClick={()=>setDetalhe(p)} style={{background:"none",border:"none",color:NAV,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>Ver detalhes</button>
                      <button onClick={()=>{setFormP(p);setEditId(p.id);setView("form_processo");}} style={{background:"none",border:"none",color:GOLD,fontSize:11,fontWeight:700,cursor:"pointer",padding:0}}>Editar</button>
                      <button onClick={()=>delP(p.id)} style={{background:"none",border:"none",color:"#e74c3c",fontSize:11,cursor:"pointer",padding:0}}>Remover</button>
                    </div>
                  </div>
                );
              })}
            </div>
            {detalhe&&<Modal p={detalhe} historicos={historicos} nomeSoc={nomeSoc} onClose={()=>setDetalhe(null)} onEdit={()=>{setFormP(detalhe);setEditId(detalhe.id);setDetalhe(null);setView("form_processo");}} onDelete={()=>delP(detalhe.id)} dlAnexo={dlAnexo}/>}
          </div>
        );
      }

      const FldStyle={borderColor:"#E0E0E0",width:"100%",border:"1px solid #E0E0E0",borderRadius:6,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"};
      const LblStyle={display:"block",fontSize:10,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginBottom:4};
      const SecStyle={fontSize:10,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:2,marginTop:20,marginBottom:12,paddingTop:16,borderTop:"1px solid #f0f0f0"};

      // FORM SOCIEDADE
      if(view==="form_sociedade")return(
        <div style={{minHeight:"100vh",background:"#F4F6F9"}}>
          <Hdr/>
          <div style={{maxWidth:520,margin:"0 auto",padding:24}}>
            <div style={{background:"#fff",borderRadius:8,padding:24,boxShadow:"0 1px 4px #0001"}}>
              <h2 style={{color:NAV,fontWeight:700,fontSize:15,marginTop:0,marginBottom:20}}>{editSocId?"Editar Sociedade":"Nova Sociedade"}</h2>
              {[{l:"Nome da Sociedade *",k:"nome"},{l:"CNPJ",k:"cnpj"},{l:"Tipo (ex: FII, FIP, Holding)",k:"tipo"}].map(f=>(
                <div key={f.k} style={{marginBottom:14}}>
                  <label style={LblStyle}>{f.l}</label>
                  <input value={formS[f.k]} onChange={e=>setFormS({...formS,[f.k]:e.target.value})} style={FldStyle}/>
                </div>
              ))}
              <div style={{marginBottom:20}}>
                <label style={LblStyle}>Observações</label>
                <textarea value={formS.observacoes} onChange={e=>setFormS({...formS,observacoes:e.target.value})} rows={2} style={{...FldStyle,resize:"vertical"}}/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={saveS} style={{background:NAV,color:GOLD,border:"none",padding:"9px 20px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>Salvar</button>
                <button onClick={()=>setView("sociedades")} style={{background:"#f0f0f0",color:"#666",border:"none",padding:"9px 20px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      );

      // FORM PROCESSO
      if(view==="form_processo")return(
        <div style={{minHeight:"100vh",background:"#F4F6F9"}}>
          <Hdr/>
          <div style={{maxWidth:680,margin:"0 auto",padding:24}}>
            <div style={{background:"#fff",borderRadius:8,padding:24,boxShadow:"0 1px 4px #0001"}}>
              <h2 style={{color:NAV,fontWeight:700,fontSize:15,marginTop:0,marginBottom:20}}>{editId?"Editar Ato Societário":"Novo Ato Societário"}</h2>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div style={{gridColumn:"1/-1"}}>
                  <label style={LblStyle}>Sociedade *</label>
                  <select value={formP.sociedade_id} onChange={e=>setFormP({...formP,sociedade_id:e.target.value})} style={FldStyle}>
                    <option value="">Selecione...</option>
                    {sociedades.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
                  </select>
                </div>
                <div style={{gridColumn:"1/-1"}}>
                  <label style={LblStyle}>Tipo de Ato *</label>
                  <input value={formP.tipo_ato} onChange={e=>setFormP({...formP,tipo_ato:e.target.value})} placeholder="Ex: Alteração de Regulamento" style={FldStyle}/>
                </div>
                <div><label style={LblStyle}>Responsável</label><input value={formP.responsavel} onChange={e=>setFormP({...formP,responsavel:e.target.value})} style={FldStyle}/></div>
                <div>
                  <label style={LblStyle}>Junta Comercial</label>
                  <select value={formP.junta} onChange={e=>setFormP({...formP,junta:e.target.value})} style={FldStyle}>
                    {["JUCESP","JUCERJA","JUCEMG","JUCEES","JUCERGS","Outra"].map(o=><option key={o}>{o}</option>)}
                  </select>
                </div>
                <div style={{gridColumn:"1/-1"}}>
                  <label style={LblStyle}>Etapa Atual</label>
                  <select value={formP.etapa} onChange={e=>setFormP({...formP,etapa:Number(e.target.value)})} style={FldStyle}>
                    {["main","exigencia","pos"].map(g=>(
                      <optgroup key={g} label={GROUP_LABELS[g].label}>
                        {COLUNAS.filter(c=>c.group===g).map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>
              </div>

              <p style={SecStyle}>📅 Datas e Protocolo</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
                {[{l:"Data Elaboração",k:"data_elaboracao",t:"date"},{l:"Data Protocolo",k:"data_protocolo",t:"date"},{l:"Nº Protocolo",k:"numero_protocolo",t:"text"},{l:"Prazo Previsto",k:"prazo_previsto",t:"date"},{l:"Data Registro",k:"data_registro",t:"date"}]
                  .map(f=><div key={f.k}><label style={LblStyle}>{f.l}</label><input type={f.t} value={formP[f.k]} onChange={e=>setFormP({...formP,[f.k]:e.target.value})} style={FldStyle}/></div>)}
              </div>

              <p style={SecStyle}>✍️ DocuSign</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div style={{gridColumn:"1/-1"}}>
                  <label style={LblStyle}>Link do Envelope</label>
                  <div style={{display:"flex",gap:8}}>
                    <input value={formP.docusign_link} onChange={e=>setFormP({...formP,docusign_link:e.target.value})} placeholder="https://account.docusign.com/..." style={{...FldStyle,flex:1}}/>
                    {formP.docusign_link&&<a href={formP.docusign_link} target="_blank" rel="noreferrer" style={{background:NAV,color:GOLD,padding:"8px 12px",borderRadius:6,fontSize:11,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap"}}>Abrir ↗</a>}
                  </div>
                </div>
                <div>
                  <label style={LblStyle}>Status DocuSign</label>
                  <select value={formP.docusign_status} onChange={e=>setFormP({...formP,docusign_status:e.target.value})} style={FldStyle}>
                    {DS_STATUS.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div><label style={LblStyle}>Signatários / Quem falta assinar</label><input value={formP.docusign_signatarios} onChange={e=>setFormP({...formP,docusign_signatarios:e.target.value})} placeholder="Ex: João ✓, Maria (pendente)" style={FldStyle}/></div>
              </div>

              <p style={SecStyle}>⚠️ Exigência</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div><label style={LblStyle}>Descrição</label><input value={formP.exigencia} onChange={e=>setFormP({...formP,exigencia:e.target.value})} style={FldStyle}/></div>
                <div><label style={LblStyle}>Data da Exigência</label><input type="date" value={formP.data_exigencia} onChange={e=>setFormP({...formP,data_exigencia:e.target.value})} style={FldStyle}/></div>
              </div>

              <p style={SecStyle}>💳 NF e Pagamento</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
                {[{l:"Nº NF",k:"nf_numero",t:"text"},{l:"Valor (R$)",k:"nf_valor",t:"text"},{l:"Data NF",k:"nf_data",t:"date"},{l:"Data Pagamento",k:"data_pagamento",t:"date"}]
                  .map(f=><div key={f.k}><label style={LblStyle}>{f.l}</label><input type={f.t} value={formP[f.k]} onChange={e=>setFormP({...formP,[f.k]:e.target.value})} style={FldStyle}/></div>)}
              </div>

              <p style={SecStyle}>📎 Anexos</p>
              <input ref={fileRef} type="file" multiple accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" style={{display:"none"}} onChange={handleFile}/>
              <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"12px",border:`1.5px dashed ${GOLD}`,borderRadius:6,background:"none",color:NAV,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                + Clique para anexar arquivos (PDF, Word, imagens — máx. 1MB cada)
              </button>
              {(formP.anexos||[]).map((a,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F8F9FA",border:"1px solid #E0E0E0",borderRadius:6,padding:"8px 12px",marginTop:6,fontSize:11}}>
                  <div><span style={{fontWeight:600,color:"#333"}}>{a.name}</span><span style={{color:"#aaa",marginLeft:8}}>{fmtSize(a.size)}</span></div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>dlAnexo(a)} style={{background:"none",border:"none",color:NAV,fontWeight:700,fontSize:11,cursor:"pointer"}}>Baixar</button>
                    <button onClick={()=>setFormP(prev=>({...prev,anexos:prev.anexos.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"#e74c3c",fontSize:11,cursor:"pointer"}}>Remover</button>
                  </div>
                </div>
              ))}

              <div style={{marginTop:14}}>
                <label style={LblStyle}>Observações</label>
                <textarea value={formP.observacoes} onChange={e=>setFormP({...formP,observacoes:e.target.value})} rows={2} style={{...FldStyle,resize:"vertical"}}/>
              </div>
              <div style={{display:"flex",gap:10,marginTop:20}}>
                <button onClick={saveP} style={{background:NAV,color:GOLD,border:"none",padding:"9px 20px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>Salvar</button>
                <button onClick={()=>{setView(selectedSoc?"sociedade_detail":"kanban");setFormP(emptyP);setEditId(null);}} style={{background:"#f0f0f0",color:"#666",border:"none",padding:"9px 20px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      );
      return null;
    }

    function Modal({p,historicos,nomeSoc,onClose,onEdit,onDelete,dlAnexo}){
      const col=COLUNAS.find(c=>c.id===p.etapa);
      const dsColor=DS_COLORS[p.docusign_status]||"#aaa";
      return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
          <div style={{background:"#fff",borderRadius:12,boxShadow:"0 8px 40px #0003",width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{background:NAV,borderBottom:`3px solid ${GOLD}`,padding:"16px 20px",borderRadius:"12px 12px 0 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"sticky",top:0}}>
              <div>
                <div style={{color:GOLD,fontWeight:700,fontSize:14}}>{nomeSoc(p.sociedade_id)}</div>
                <div style={{color:"#fff",fontSize:11,opacity:.5,marginTop:2}}>{p.tipo_ato} — {p.junta}</div>
              </div>
              <button onClick={onClose} style={{background:"none",border:"none",color:"#fff",opacity:.5,fontSize:18,cursor:"pointer",lineHeight:1}}>✕</button>
            </div>
            <div style={{padding:20}}>
              <span style={{background:col?.color,color:col?.accent,border:`1px solid ${col?.accent}44`,fontSize:10,padding:"4px 10px",borderRadius:20,fontWeight:700}}>{col?.label}</span>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16}}>
                {[["Responsável",p.responsavel],["Elaboração",fmt(p.data_elaboracao)],["Protocolo Nº",p.numero_protocolo],["Data Protocolo",fmt(p.data_protocolo)],["Prazo Previsto",fmt(p.prazo_previsto)],["Data Registro",fmt(p.data_registro)],["Exigência",p.exigencia],["Data Exigência",fmt(p.data_exigencia)],["NF Nº",p.nf_numero],["Valor NF",p.nf_valor?`R$ ${parseFloat(p.nf_valor).toLocaleString("pt-BR",{minimumFractionDigits:2})}`:""],["Data NF",fmt(p.nf_data)],["Data Pagamento",fmt(p.data_pagamento)]]
                  .filter(([,v])=>v).map(([k,v])=>(
                    <div key={k}><div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:1}}>{k}</div><div style={{color:NAV,fontWeight:700,fontSize:12,marginTop:2}}>{v}</div></div>
                  ))}
              </div>
              {(p.docusign_link||p.docusign_status!=="—")&&(
                <div style={{background:"#F0F4FF",border:"1px solid #4361EE22",borderRadius:8,padding:12,marginTop:14}}>
                  <div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>✍️ DocuSign</div>
                  {p.docusign_status&&p.docusign_status!=="—"&&<div style={{color:dsColor,fontWeight:700,fontSize:13,marginBottom:4}}>● {p.docusign_status}</div>}
                  {p.docusign_signatarios&&<div style={{fontSize:11,color:"#555",marginBottom:6}}><strong>Signatários:</strong> {p.docusign_signatarios}</div>}
                  {p.docusign_link&&<a href={p.docusign_link} target="_blank" rel="noreferrer" style={{background:NAV,color:GOLD,padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,textDecoration:"none",display:"inline-block"}}>Abrir no DocuSign ↗</a>}
                </div>
              )}
              {p.observacoes&&<div style={{background:"#fafafa",borderLeft:`3px solid ${GOLD}`,borderRadius:4,padding:10,fontSize:12,color:"#555",marginTop:12}}><strong>Obs:</strong> {p.observacoes}</div>}
              {p.anexos?.length>0&&(
                <div style={{marginTop:14}}>
                  <div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>📎 Anexos</div>
                  {p.anexos.map((a,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F8F9FA",border:"1px solid #E0E0E0",borderRadius:6,padding:"7px 10px",marginBottom:4,fontSize:11}}>
                      <div><span style={{fontWeight:600,color:"#333"}}>{a.name}</span><span style={{color:"#aaa",marginLeft:8}}>{(a.size/1024).toFixed(0)} KB</span></div>
                      <button onClick={()=>dlAnexo(a)} style={{background:"none",border:"none",color:NAV,fontWeight:700,fontSize:11,cursor:"pointer"}}>Baixar</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:1,marginTop:16,marginBottom:6}}>Histórico</div>
              <div style={{maxHeight:140,overflowY:"auto"}}>
                {(historicos[p.id]||[]).slice().reverse().map((h,i)=>{
                  const hcol=COLUNAS.find(c=>c.id===h.etapa);
                  return(
                    <div key={i} style={{borderLeft:`2px solid ${hcol?.accent||"#ccc"}`,background:"#fafafa",borderRadius:4,padding:"6px 8px",marginBottom:4,fontSize:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",color:"#bbb"}}><span>{h.data}</span><span>{h.user}</span></div>
                      <div style={{color:"#444",marginTop:2}}><strong>{hcol?.label}</strong> — {h.obs}</div>
                    </div>
                  );
                })}
                {!(historicos[p.id]?.length)&&<div style={{fontSize:11,color:"#ccc"}}>Sem histórico.</div>}
              </div>
              <div style={{display:"flex",gap:8,marginTop:18}}>
                <button onClick={onEdit} style={{flex:1,background:NAV,color:GOLD,border:"none",padding:"9px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer"}}>Editar</button>
                <button onClick={onDelete} style={{padding:"9px 14px",background:"#fff0f0",color:"#e74c3c",border:"none",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>Remover</button>
                <button onClick={onClose} style={{flex:1,background:"#f0f0f0",color:"#666",border:"none",padding:"9px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer"}}>Fechar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
